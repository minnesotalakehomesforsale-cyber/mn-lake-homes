<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Agents | MN Lake Homes Admin</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    <style>
        /* Admin layout base */
        html, body { margin: 0; padding: 0; background: #f7f9fa; font-family: 'Inter', sans-serif; color: #1a202c; }
        .admin-wrap { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
        .admin-side { background: #1a202c; color: #fff; padding: 2rem 1.5rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        .admin-side h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 2.5rem; padding-left: 0.5rem; color: #fff; margin-top: 0; }
        .admin-side h1 span { color: #1d6df2; }
        .side-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #4a5568; margin-bottom: 0.75rem; padding-left: 0.5rem; font-weight: 700; margin-top: 0; }
        .side-nav { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; }
        .side-link { display: block; padding: 0.75rem 1rem; border-radius: 8px; color: #a0aec0; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
        .side-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .side-link.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 600; }
        .side-link.dim { opacity: 0.35; cursor: default; pointer-events: none; }
        .side-signout { display: block; padding: 0.75rem 1rem; border-radius: 8px; color: #fc8181; text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-top: 1rem; transition: all 0.15s; }
        .side-signout:hover { background: rgba(252,129,129,0.1); }
        .admin-main { padding: 3rem 3.5rem; background: #f7f9fa; overflow-y: auto; }

        .filter-tab { padding: 0.75rem 1.5rem; border: none; background: transparent; font-weight: 600; color: #718096; border-bottom: 2px solid transparent; cursor: pointer; }
        .filter-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
        .filter-container { border-bottom: 1px solid #edf2f7; display: flex; gap: 1rem; margin-bottom: 2rem; }

        .ledger-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #edf2f7; }
        .ledger-table th { background: #f7f9fa; padding: 1.25rem 1.5rem; text-align: left; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #4a5568; border-bottom: 1px solid #edf2f7; font-weight: 700; }
        .ledger-table td { padding: 1.25rem 1.5rem; border-bottom: 1px solid #edf2f7; vertical-align: middle; color: #2d3748; font-weight: 500; }
        .ledger-table tr:hover { background-color: #fcfcfc; cursor: pointer; }

        .s-badge { padding: 0.35rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border: 1px solid transparent; display: inline-block; }
        .s-pending { background: #ebf8ff; color: #2b6cb0; border-color: #bee3f8; }
        .s-published { background: #f0fff4; color: #2f855a; border-color: #c6f6d5; }
        .s-draft { background: #fefcbf; color: #975a16; border-color: #f6e05e; }
        .s-suspended { background: #fff5f5; color: #c53030; border-color: #fed7d7; }
    </style>
</head>
<body style="background-color: #f7f9fa; color: #1a202c; margin: 0; padding: 0;">

    <div class="admin-wrap">
        <!-- Sidebar -->
        <aside class="admin-side">
            <h1>MNLH <span>ADMIN</span></h1>
            <p class="side-label">Platform Operations</p>
            <nav class="side-nav">
                <a href="dashboard.html" class="side-link">Dashboard</a>
                <a href="agents.html"   class="side-link active">Agents Directory</a>
                <a href="leads.html"    class="side-link">Central Leads</a>
                <a href="#" class="side-link dim">Users Management</a>
                <a href="#" class="side-link dim">Membership Tiers</a>
            </nav>
            <a href="../../index.html" class="side-signout">Sign Out</a>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 2rem; font-weight: 800; color: #1a202c; letter-spacing: -1px; margin-bottom: 0.5rem;">Agent Ledger</h1>
                <p style="color: #718096; font-size: 1rem;">Click any row to open the formal Profile Review and Approval workflow.</p>
            </header>

            <div class="filter-container">
                <button class="filter-tab active" onclick="filterTable('all', this)">All Agents</button>
                <button id="filter-pending-btn" class="filter-tab" onclick="filterTable('pending_review', this)" style="color: #2b6cb0;">Pending Review (0)</button>
                <button class="filter-tab" onclick="filterTable('published', this)">Published</button>
                <button class="filter-tab" onclick="filterTable('draft', this)">Drafts</button>
            </div>

            <table class="ledger-table" id="agentsTable">
                <thead>
                    <tr>
                        <th>Agent Name</th>
                        <th>Brokerage</th>
                        <th>Membership</th>
                        <th>Profile Status</th>
                        <th>Live Output?</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Javascript Will Inject Mock Rows Here based on the filter -->
                </tbody>
            </table>
        </main>
    </div>

    <script>
        // Hook to PostgreSQL Native Backend
        async function getAgentsMap() {
            try {
                const res = await fetch('/api/admin');
                if (!res.ok) return [];
                return await res.json();
            } catch (err) {
                return [];
            }
        }

        function getStatusBadge(status) {
            switch(status) {
                case 'pending_review': return `<span class="s-badge s-pending">Pending Review</span>`;
                case 'published': return `<span class="s-badge s-published">Published</span>`;
                case 'draft': return `<span class="s-badge s-draft">Draft</span>`;
                case 'suspended': return `<span class="s-badge s-suspended">Suspended</span>`;
                default: return `<span class="s-badge s-draft">${status}</span>`;
            }
        }

        async function renderTable(filter) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">Loading Core System Ledger...</td></tr>';

            const agentsMap = await getAgentsMap();
            body.innerHTML = ''; // Clear for render

            const filtered = filter === 'all' ? agentsMap : agentsMap.filter(a => a.profile_status === filter);

            // Update UI Counters
            const pendingCount = agentsMap.filter(a => a.profile_status === 'pending_review').length;
            document.querySelector('#filter-pending-btn').textContent = `Pending Review (${pendingCount})`;

            filtered.forEach(agent => {
                const tr = document.createElement('tr');
                tr.onclick = () => { window.location.href = `agent-review.html?id=${agent.id}`; };
                
                const liveBadge = agent.is_published ? `<span style="color: #38a169; font-weight: 700;">TRUE</span>` : `<span style="color: #a0aec0; font-weight: 600;">FALSE</span>`;

                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 700; color: #1a202c;">${agent.display_name}</div>
                        <div style="font-size: 0.8rem; color: #a0aec0;">ID: ${agent.id}</div>
                    </td>
                    <td>${agent.brokerage_name || 'N/A'}</td>
                    <td><span style="background: #edf2f7; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700;">${agent.membership_name || agent.membership_badge || 'Agent'}</span></td>
                    <td>${getStatusBadge(agent.profile_status)}</td>
                    <td>${liveBadge}</td>
                    <td><button style="border: none; background: #ebf8ff; color: #2b6cb0; font-weight: 600; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;">Review</button></td>
                `;
                body.appendChild(tr);
            });
        }

        function filterTable(status, element) {
            document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderTable(status);
        }

        // Init
        document.addEventListener("DOMContentLoaded", () => renderTable('all'));
    </script>
    <global-footer></global-footer>
</body>
</html>
