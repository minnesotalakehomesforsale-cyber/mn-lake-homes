<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings | MN Lake Homes Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        html, body { margin: 0; padding: 0; background: #f7f9fa; font-family: 'SF Pro Text', sans-serif; color: #1a202c; }
        .ls-table { width: 100%; background: #fff; border: 1px solid #edf2f7; border-radius: 12px; border-collapse: separate; border-spacing: 0; overflow: hidden; }
        .ls-table th { text-align: left; padding: 0.9rem 1rem; font-size: 0.72rem; font-weight: 800; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; background: #f7f9fa; border-bottom: 1px solid #edf2f7; }
        .ls-table td { padding: 0.85rem 1rem; font-size: 0.9rem; color: #2d3748; border-bottom: 1px solid #f7f9fa; vertical-align: middle; }
        .ls-table tr:last-child td { border-bottom: none; }
        .ls-thumb { width: 46px; height: 34px; border-radius: 6px; object-fit: cover; background: #eceff3; }
        .ls-status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 6px; }
        .ls-status.active { background:#f0fff4; color:#2f855a; }
        .ls-status.pending{ background:#fffaf0; color:#dd6b20; }
        .ls-status.sold   { background:#fff5f5; color:#c53030; }
        .ls-status.draft  { background:#edf2f7; color:#4a5568; }
        .ovl { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9000; align-items:flex-start; justify-content:center; padding:3rem 1rem; overflow-y:auto; }
        .ovl.open { display:flex; }
        .modal { background:#fff; border-radius:16px; width:100%; max-width:720px; box-shadow:0 30px 60px rgba(0,0,0,0.25); margin:auto; }
        .m-hdr { display:flex; justify-content:space-between; align-items:center; padding:1.25rem 1.5rem; border-bottom:1px solid #edf2f7; }
        .m-hdr h2 { margin:0; font-size:1.2rem; }
        .m-close { background:none; border:0; font-size:1.6rem; color:#718096; cursor:pointer; }
        .m-body { padding:1.5rem; }
        .fld { margin-bottom:1rem; }
        .fld label { display:block; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#4a5568; margin-bottom:0.35rem; }
        .fld input, .fld select, .fld textarea { width:100%; padding:0.65rem 0.85rem; border:1px solid #e2e8f0; border-radius:8px; font:inherit; box-sizing:border-box; }
        .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:0.85rem; }
        .grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:0.85rem; }
        .err { display:none; background:#fff5f5; color:#c53030; border:1px solid #feb2b2; padding:0.7rem 0.9rem; border-radius:8px; margin-bottom:1rem; font-weight:600; }
        .btn-primary { background:#1d6df2; color:#fff; border:0; border-radius:8px; padding:0.7rem 1.3rem; font-weight:700; cursor:pointer; }
        .btn-ghost { background:#fff; color:#4a5568; border:1px solid #e2e8f0; border-radius:8px; padding:0.7rem 1.3rem; font-weight:700; cursor:pointer; }
        .ls-empty { padding:3rem; text-align:center; color:#a0aec0; }
    </style>
    <script src="../../components/admin-guard.js"></script>
    <script src="../../components/admin-responsive.js" defer></script>
    <script src="../../components/admin-sidebar.js" defer></script>
    <script src="../../components/admin-assistant.js" defer></script>
</head>
<body>
    <div class="admin-wrap">
        <admin-sidebar active="listings"></admin-sidebar>
        <main class="admin-main">
            <header style="margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;">
                <div>
                    <h1 style="font-size:1.85rem;font-weight:800;letter-spacing:-0.75px;margin:0 0 0.25rem;">Listings</h1>
                    <p style="color:#718096;font-size:0.95rem;margin:0;">Property listings. Tie each to a lake to power the live "homes for sale" count + grid on that lake's page, and each gets its own SEO page.</p>
                </div>
                <button class="btn-primary" onclick="openCreate()">+ New listing</button>
            </header>
            <div id="table-wrap"><div class="ls-empty">Loading…</div></div>
        </main>
    </div>

    <div id="modal" class="ovl" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="m-hdr"><h2 id="modal-title">New listing</h2><button class="m-close" onclick="closeModal()">×</button></div>
            <div class="m-body">
                <div id="err" class="err"></div>
                <input type="hidden" id="f-id">
                <div class="fld"><label>Title *</label><input id="f-title" placeholder="e.g. 4BR Gull Lake Waterfront Cabin"></div>
                <div class="grid2">
                    <div class="fld"><label>Lake</label><select id="f-lake"><option value="">— none —</option></select></div>
                    <div class="fld"><label>Status</label><select id="f-status"><option value="active">Active</option><option value="pending">Pending</option><option value="sold">Sold</option><option value="draft">Draft</option></select></div>
                </div>
                <div class="fld"><label>Address</label><input id="f-address" placeholder="12345 Lake Shore Dr"></div>
                <div class="grid3">
                    <div class="fld"><label>City</label><input id="f-city" placeholder="Nisswa"></div>
                    <div class="fld"><label>State</label><input id="f-state" value="MN"></div>
                    <div class="fld"><label>ZIP</label><input id="f-zip" placeholder="56468"></div>
                </div>
                <div class="grid3">
                    <div class="fld"><label>Price ($)</label><input id="f-price" type="number" placeholder="750000"></div>
                    <div class="fld"><label>Beds</label><input id="f-beds" type="number"></div>
                    <div class="fld"><label>Baths</label><input id="f-baths" type="number" step="0.5"></div>
                </div>
                <div class="grid3">
                    <div class="fld"><label>Sq Ft</label><input id="f-sqft" type="number"></div>
                    <div class="fld"><label>Lot (acres)</label><input id="f-lot" type="number" step="0.01"></div>
                    <div class="fld"><label>Waterfront (ft)</label><input id="f-wf" type="number"></div>
                </div>
                <div class="fld"><label>Featured image URL</label><input id="f-image" placeholder="https://…"></div>
                <div class="grid2">
                    <div class="fld"><label>MLS #</label><input id="f-mls"></div>
                    <div class="fld"><label>External listing URL</label><input id="f-ext" placeholder="https://…"></div>
                </div>
                <div class="fld"><label>Description</label><textarea id="f-desc" rows="5"></textarea></div>
                <div style="display:flex;justify-content:space-between;gap:0.5rem;margin-top:0.5rem;">
                    <button class="btn-ghost" style="color:#c53030;border-color:#fc8181;" id="del-btn" onclick="removeListing()" hidden>🗑 Delete</button>
                    <div style="display:flex;gap:0.5rem;margin-left:auto;">
                        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
                        <button class="btn-primary" id="save-btn" onclick="save()">Save listing</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let _lakes = [];
        function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
        function money(n){return n==null||n===''?'—':'$'+Number(n).toLocaleString('en-US');}

        async function loadLakes() {
            try { const r = await fetch('/api/lakes?status=all'); _lakes = r.ok ? await r.json() : []; }
            catch { _lakes = []; }
            document.getElementById('f-lake').innerHTML = '<option value="">— none —</option>' +
                _lakes.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
        }

        async function load() {
            const wrap = document.getElementById('table-wrap');
            try {
                const res = await fetch('/api/listings/admin');
                if (!res.ok) throw new Error();
                const rows = await res.json();
                if (!rows.length) { wrap.innerHTML = '<div class="ls-empty">No listings yet. Click “+ New listing”.</div>'; return; }
                wrap.innerHTML = `<table class="ls-table"><thead><tr>
                    <th></th><th>Title</th><th>Lake</th><th>City</th><th>Price</th><th>Beds/Baths</th><th>Status</th><th></th>
                    </tr></thead><tbody>${rows.map(r => `
                    <tr>
                        <td><img class="ls-thumb" src="${esc(r.featured_image_url||'/assets/images/agent-placeholder.svg')}" alt=""></td>
                        <td style="font-weight:700;">${esc(r.title)}</td>
                        <td>${esc(r.lake_name||'—')}</td>
                        <td>${esc(r.city||'—')}</td>
                        <td>${money(r.price)}</td>
                        <td>${r.beds??'—'} / ${r.baths??'—'}</td>
                        <td><span class="ls-status ${r.status}">${r.status}</span></td>
                        <td style="text-align:right;">
                            ${r.status==='active'?`<a href="/listings/${esc(r.slug)}" target="_blank" style="color:#718096;margin-right:0.6rem;text-decoration:none;">View</a>`:''}
                            <button class="btn-ghost" style="padding:0.35rem 0.8rem;" onclick='openEdit(${JSON.stringify(r.id)})'>Edit</button>
                        </td>
                    </tr>`).join('')}</tbody></table>`;
            } catch { wrap.innerHTML = '<div class="ls-empty">Could not load listings.</div>'; }
        }

        const V = id => document.getElementById(id).value;
        const setV = (id, v) => document.getElementById(id).value = (v==null?'':v);

        function fillForm(r) {
            setV('f-id', r.id); setV('f-title', r.title); setV('f-lake', r.lake_id||'');
            setV('f-status', r.status||'active'); setV('f-address', r.address); setV('f-city', r.city);
            setV('f-state', r.state||'MN'); setV('f-zip', r.zip); setV('f-price', r.price);
            setV('f-beds', r.beds); setV('f-baths', r.baths); setV('f-sqft', r.sqft);
            setV('f-lot', r.lot_acres); setV('f-wf', r.waterfront_feet); setV('f-image', r.featured_image_url);
            setV('f-mls', r.mls_number); setV('f-ext', r.external_url); setV('f-desc', r.description);
        }

        function openCreate() {
            fillForm({ status:'active', state:'MN' });
            document.getElementById('modal-title').textContent = 'New listing';
            document.getElementById('del-btn').hidden = true;
            document.getElementById('err').style.display='none';
            document.getElementById('modal').classList.add('open');
        }

        async function openEdit(id) {
            let r;
            try {
                const res = await fetch(`/api/listings/admin/${encodeURIComponent(id)}`);
                if (!res.ok) throw new Error();
                r = await res.json();
            } catch { return alert('Could not load that listing.'); }
            fillForm(r);
            document.getElementById('modal-title').textContent = 'Edit listing';
            document.getElementById('del-btn').hidden = false;
            document.getElementById('err').style.display='none';
            document.getElementById('modal').classList.add('open');
        }

        function closeModal(){ document.getElementById('modal').classList.remove('open'); }

        function payload() {
            return {
                title:V('f-title').trim(), lake_id:V('f-lake')||null, status:V('f-status'),
                address:V('f-address').trim(), city:V('f-city').trim(), state:V('f-state').trim()||'MN', zip:V('f-zip').trim(),
                price:V('f-price'), beds:V('f-beds'), baths:V('f-baths'), sqft:V('f-sqft'),
                lot_acres:V('f-lot'), waterfront_feet:V('f-wf'), featured_image_url:V('f-image').trim(),
                mls_number:V('f-mls').trim(), external_url:V('f-ext').trim(), description:V('f-desc').trim(),
            };
        }

        async function save() {
            const err = document.getElementById('err');
            const id = V('f-id');
            const body = payload();
            if (!body.title) { err.textContent='Title is required.'; err.style.display='block'; return; }
            const btn = document.getElementById('save-btn'); btn.disabled=true; const o=btn.textContent; btn.textContent='Saving…';
            try {
                const res = await fetch(id ? `/api/listings/admin/${id}` : '/api/listings/admin', {
                    method: id ? 'PUT' : 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body),
                });
                const data = await res.json().catch(()=>({}));
                if (!res.ok) { err.textContent = data.error||'Save failed.'; err.style.display='block'; return; }
                closeModal(); load();
            } catch { err.textContent='Network error.'; err.style.display='block'; }
            finally { btn.disabled=false; btn.textContent=o; }
        }

        async function removeListing() {
            const id = V('f-id'); if (!id) return;
            if (!confirm('Delete this listing permanently?')) return;
            try {
                const res = await fetch(`/api/listings/admin/${id}`, { method:'DELETE' });
                if (!res.ok) return alert('Delete failed.');
                closeModal(); load();
            } catch { alert('Network error.'); }
        }

        document.addEventListener('DOMContentLoaded', () => { loadLakes(); load(); });
    </script>
</body>
</html>
