<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics &amp; Database | MN Lake Homes Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        html, body { margin: 0; padding: 0; background: #f7f9fa; font-family: 'SF Pro Text', sans-serif; color: #1a202c; }

        .sys-head { margin-bottom: 1.5rem; }
        .sys-head h1 { font-size: 1.85rem; font-weight: 800; letter-spacing: -0.75px; margin: 0 0 0.25rem; }
        .sys-head p  { color: #718096; font-size: 0.9rem; margin: 0; }

        /* Page tab strip — mirrors lakes-towns.html for visual parity. */
        .page-tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; border-bottom: 2px solid #edf2f7; overflow-x: auto; }
        .page-tab {
            padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 600;
            color: #718096; border: none; background: none; cursor: pointer;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
            font-family: inherit; transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .page-tab:hover { color: #1a202c; }
        .page-tab.active { color: #1d6df2; border-bottom-color: #1d6df2; }

        /* Each iframe pane auto-grows via postMessage from the embedded page. */
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .sys-frame {
            width: 100%; border: 0; display: block;
            min-height: 600px;
            background: #f7f9fa;
        }
    </style>
    <script src="../../components/admin-guard.js"></script>
    <script src="../../components/admin-responsive.js" defer></script>
    <script src="../../components/admin-sidebar.js" defer></script>
    <script src="../../components/admin-assistant.js" defer></script>
    <script src="../../components/admin-nav-badges.js" defer></script>
</head>
<body>
<div class="admin-wrap">
    <admin-sidebar active="system"></admin-sidebar>

    <main class="admin-main">
        <div class="sys-head">
            <h1>Metrics &amp; Database</h1>
            <p>Traffic, agent coverage, system health, table counts, and the full activity audit — all in one place.</p>
        </div>

        <!-- One flat header. Traffic/Conversions/Agent coverage drive the single
             metrics iframe via ?tab; Database, Lead routing, Images are their own. -->
        <div class="page-tabs" role="tablist">
            <button id="tab-btn-traffic"     class="page-tab active" role="tab" onclick="showSys('traffic')">Traffic</button>
            <button id="tab-btn-conversions" class="page-tab"        role="tab" onclick="showSys('conversions')">Conversions</button>
            <button id="tab-btn-coverage"    class="page-tab"        role="tab" onclick="showSys('coverage')">Agent coverage</button>
            <button id="tab-btn-bizcov"      class="page-tab"        role="tab" onclick="showSys('bizcov')">Business coverage</button>
            <button id="tab-btn-database"    class="page-tab"        role="tab" onclick="showSys('database')">Database</button>
            <button id="tab-btn-diagnostics" class="page-tab"        role="tab" onclick="showSys('diagnostics')">Lead routing</button>
            <button id="tab-btn-images"      class="page-tab"        role="tab" onclick="showSys('images')">Images</button>
            <button id="tab-btn-towns"       class="page-tab"        role="tab" onclick="showSys('towns')">Geo Tags</button>
        </div>

        <div id="pane-metrics" class="tab-pane active" role="tabpanel">
            <iframe id="frame-metrics" class="sys-frame" data-src="metrics.html?embed=1&amp;tab=traffic" title="Metrics"></iframe>
        </div>
        <div id="pane-database" class="tab-pane" role="tabpanel">
            <iframe id="frame-database" class="sys-frame" data-src="database.html?embed=1" title="Database"></iframe>
        </div>
        <div id="pane-diagnostics" class="tab-pane" role="tabpanel">
            <iframe id="frame-diagnostics" class="sys-frame" data-src="diagnostics.html?embed=1" title="Lead Routing Diagnostics"></iframe>
        </div>
        <div id="pane-images" class="tab-pane" role="tabpanel">
            <iframe id="frame-images" class="sys-frame" data-src="images.html?embed=1" title="Images"></iframe>
        </div>
        <div id="pane-towns" class="tab-pane" role="tabpanel">
            <iframe id="frame-towns" class="sys-frame" data-src="tags.html?embed=1" title="Geo Tags"></iframe>
        </div>
        <div id="pane-bizcov" class="tab-pane" role="tabpanel">
            <iframe id="frame-bizcov" class="sys-frame" data-src="business-coverage.html?embed=1" title="Business coverage"></iframe>
        </div>
    </main>
</div>

<script>
    // Each header tab → which pane shows + (for the shared metrics iframe) which sub-tab.
    const TAB_CFG = {
        traffic:     { pane: 'metrics',     metricsTab: 'traffic' },
        conversions: { pane: 'metrics',     metricsTab: 'conversions' },
        coverage:    { pane: 'metrics',     metricsTab: 'coverage' },
        bizcov:      { pane: 'bizcov' },
        database:    { pane: 'database' },
        diagnostics: { pane: 'diagnostics' },
        images:      { pane: 'images' },
        towns:       { pane: 'towns' },
    };
    const TABS = Object.keys(TAB_CFG);
    const PANES = ['metrics', 'database', 'diagnostics', 'images', 'towns', 'bizcov'];
    const _params = new URLSearchParams(window.location.search);
    const _initialTab = TABS.includes(_params.get('tab')) ? _params.get('tab') : 'traffic';

    function showSys(name) {
        if (!TABS.includes(name)) name = 'traffic';
        const cfg = TAB_CFG[name];
        TABS.forEach(k => document.getElementById('tab-btn-' + k).classList.toggle('active', k === name));
        PANES.forEach(p => document.getElementById('pane-' + p).classList.toggle('active', p === cfg.pane));

        if (cfg.metricsTab) {
            // Traffic/Conversions/Agent coverage share ONE metrics iframe — only
            // reload it when the requested sub-tab actually changes.
            const f = document.getElementById('frame-metrics');
            const want = 'metrics.html?embed=1&tab=' + cfg.metricsTab;
            if (f.getAttribute('src') !== want && (f.src || '').indexOf('tab=' + cfg.metricsTab) === -1) f.src = want;
        } else {
            const f = document.getElementById('frame-' + cfg.pane);
            if (f && !f.src) f.src = f.dataset.src;
        }
        const url = new URL(window.location);
        if (name === 'traffic') url.searchParams.delete('tab'); else url.searchParams.set('tab', name);
        history.replaceState(null, '', url);
    }

    // Iframe auto-resize via postMessage from embed-mode pages.
    window.addEventListener('message', (e) => {
        const m = e.data;
        if (!m || m.lt !== 'height' || typeof m.h !== 'number') return;
        const target = document.getElementById('frame-' + m.frame);
        if (target) target.style.height = Math.max(600, m.h + 8) + 'px';
    });

    document.addEventListener('DOMContentLoaded', () => {
        // The metrics iframe starts on ?tab=traffic; set its src now so Traffic is live.
        const fm = document.getElementById('frame-metrics'); if (fm && !fm.src) fm.src = fm.dataset.src;
        showSys(_initialTab);
    });
</script>
</body>
</html>
