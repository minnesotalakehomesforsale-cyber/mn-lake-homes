<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Cockpit | MN Lake Homes Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        html, body { margin: 0; padding: 0; background: #f7f9fa; font-family: 'SF Pro Text', sans-serif; color: #1a202c; }
        .ck-hero { background: linear-gradient(135deg,#0f2b46,#1d6df2); color: #fff; border-radius: 18px; padding: 1.8rem 2rem; display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; justify-content: space-between; }
        .ck-hero .big { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
        .ck-hero .lbl { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.85; margin-bottom: 0.2rem; }
        .ck-hero .sub { opacity: 0.9; font-size: 0.95rem; margin-top: 0.3rem; }
        .ck-chart { flex: 1; min-width: 220px; max-width: 360px; }
        .ck-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; margin-top: 1.25rem; }
        .ck-card { background: #fff; border: 1px solid #edf2f7; border-radius: 14px; padding: 1.25rem 1.4rem; }
        .ck-card .v { font-size: 1.9rem; font-weight: 800; color: #0f2b46; letter-spacing: -0.8px; }
        .ck-card .l { font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #a0aec0; margin-top: 0.2rem; }
        .ck-card .s { font-size: 0.82rem; color: #718096; margin-top: 0.35rem; }
        .ck-card.warn { border-color: #fed7aa; background: #fffbf5; }
        .ck-card.warn .v { color: #c05621; }
        .ck-sec { font-size: 1.1rem; font-weight: 800; margin: 2rem 0 0.75rem; color: #0f2b46; }
        .ck-state { text-align: center; color: #a0aec0; padding: 3rem; }
    </style>
    <script src="../../components/admin-guard.js"></script>
    <script src="../../components/admin-responsive.js" defer></script>
    <script src="../../components/admin-sidebar.js" defer></script>
    <script src="../../components/admin-assistant.js" defer></script>
</head>
<body>
    <div class="admin-wrap">
        <admin-sidebar active="cockpit"></admin-sidebar>
        <main class="admin-main">
            <header style="margin-bottom:1.5rem;">
                <h1 style="font-size:1.85rem;font-weight:800;letter-spacing:-0.75px;margin:0 0 0.25rem;">Revenue Cockpit</h1>
                <p style="color:#718096;font-size:0.95rem;margin:0;">The whole business on one screen — recurring revenue, churn, and every income stream.</p>
            </header>
            <div id="ck-body"><div class="ck-state">Loading…</div></div>
        </main>
    </div>
    <script>
        const money = n => '$' + Number(n || 0).toLocaleString('en-US');
        function spark(points) {
            const vals = points.map(p => Number(p.total_mrr));
            if (vals.length < 2) return '';
            const w = 340, h = 90, pad = 6;
            const min = Math.min(...vals), max = Math.max(...vals), span = (max - min) || 1;
            const step = (w - pad * 2) / (vals.length - 1);
            const pts = vals.map((v, i) => [pad + i * step, h - pad - ((v - min) / span) * (h - pad * 2)]);
            const line = pts.map((c, i) => (i ? 'L' : 'M') + c[0].toFixed(1) + ' ' + c[1].toFixed(1)).join(' ');
            const area = `${line} L ${pts[pts.length-1][0].toFixed(1)} ${h-pad} L ${pts[0][0].toFixed(1)} ${h-pad} Z`;
            return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:90px;display:block;"><path d="${area}" fill="rgba(255,255,255,0.18)"></path><path d="${line}" fill="none" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"></path></svg>`;
        }
        fetch('/api/cockpit', { credentials: 'include' }).then(r => r.json()).then(d => {
            if (d.error) { document.getElementById('ck-body').innerHTML = `<div class="ck-state" style="color:#c53030;">${d.error}</div>`; return; }
            const hero = `<div class="ck-hero">
                <div><div class="lbl">Monthly recurring revenue</div><div class="big">${money(d.mrr.total)}</div><div class="sub">${money(d.mrr.arr)} ARR · ${d.seats.agents} agents · ${d.seats.business} businesses</div></div>
                <div class="ck-chart">${d.history && d.history.length >= 2 ? spark(d.history) : '<div style="opacity:0.7;font-size:0.85rem;">MRR trend builds monthly.</div>'}</div>
            </div>`;
            const cards = [
                { v: money(d.mrr.agents), l: 'Agent MRR', s: `${d.seats.agents} paid seats` },
                { v: money(d.mrr.business), l: 'Business MRR', s: `${d.seats.business} paid` },
                { v: money(d.boost_revenue_30d), l: 'Boost revenue (30d)', s: `${d.boosts_30d} boosts` },
                { v: money(d.referral_revenue_30d), l: 'Referral fees (30d)', s: `${d.referrals_30d} referrals` },
                { v: money(d.cash_offers.pipeline_value), l: 'Cash-offer pipeline', s: `${d.cash_offers.open} open · ${d.cash_offers.won} won` },
            ];
            const cardsHtml = `<div class="ck-grid">${cards.map(c => `<div class="ck-card"><div class="v">${c.v}</div><div class="l">${c.l}</div><div class="s">${c.s}</div></div>`).join('')}</div>`;
            const attention = `<div class="ck-sec">Needs attention</div><div class="ck-grid">
                <div class="ck-card ${d.churn_30d ? 'warn' : ''}"><div class="v">${d.churn_30d}</div><div class="l">Cancellations (30d)</div><div class="s">Win-back sequence auto-runs</div></div>
                <div class="ck-card ${d.at_risk ? 'warn' : ''}"><div class="v">${d.at_risk}</div><div class="l">Agents at risk</div><div class="s">Ghosting leads or dormant</div></div>
            </div>`;
            document.getElementById('ck-body').innerHTML = hero + cardsHtml + attention;
        }).catch(() => { document.getElementById('ck-body').innerHTML = '<div class="ck-state" style="color:#c53030;">Could not load the cockpit.</div>'; });
    </script>
</body>
</html>
