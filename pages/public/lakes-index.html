<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <title>Minnesota Lakes — Alphabetical Directory | Lake Homes Real Estate</title>
    <meta name="description" content="Every Minnesota lake in our directory, listed alphabetically. Tap any lake to see agents, service providers, and the towns it's part of.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://minnesotalakehomesforsale.com/lakes">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Minnesota Lakes Directory">
    <meta property="og:description" content="Alphabetical index of every Minnesota lake in our network.">

    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="../../components/components.js" defer></script>

    <style>
        .lx-hero { padding: 9rem 2rem 3rem; background-color: var(--bg-dark); color: #fff; text-align: center; }
        .lx-hero h1 { font-size: 3.25rem; font-weight: 700; letter-spacing: -1.5px; line-height: 1.1; margin: 0 0 1rem; }
        .lx-hero h1 span { color: var(--accent-blue); }
        .lx-hero p { font-size: 1.1rem; color: #a0aec0; max-width: 640px; margin: 0 auto 1.5rem; line-height: 1.6; }
        .lx-hero .pillrow { display: inline-flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 0.5rem; }
        .lx-hero .pillrow a { display: inline-flex; align-items: center; gap: 0.35rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); color: #fff; font-size: 0.82rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 99px; text-decoration: none; transition: background 0.15s, border-color 0.15s; }
        .lx-hero .pillrow a:hover { background: rgba(29,109,242,0.18); border-color: #1d6df2; }

        .lx-toolbar-wrap { background: #f7f9fa; border-bottom: 1px solid #edf2f7; }
        .lx-toolbar { max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
        .lx-toolbar input, .lx-toolbar select { font-family: inherit; font-size: 0.95rem; padding: 0.7rem 1rem; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
        .lx-toolbar input:focus, .lx-toolbar select:focus { border-color: #1d6df2; box-shadow: 0 0 0 3px rgba(29,109,242,0.12); }
        .lx-toolbar input[type="search"] { flex: 1; min-width: 260px; }
        .lx-toolbar-count { margin-left: auto; font-size: 0.85rem; color: #718096; font-weight: 600; }

        .lx-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 6rem; }

        /* Alphabetical letter groups */
        .lx-letter { margin-bottom: 2.5rem; }
        .lx-letter-head {
            display: flex; align-items: baseline; gap: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #edf2f7;
            margin-bottom: 1rem;
        }
        .lx-letter-head h2 { font-size: 2rem; font-weight: 800; color: #1a202c; margin: 0; letter-spacing: -0.5px; }
        .lx-letter-head .count { font-size: 0.78rem; color: #a0aec0; font-weight: 600; }

        .lx-row-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.35rem 1rem; }
        .lx-row {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.65rem 0.75rem; border-radius: 8px;
            text-decoration: none; color: inherit;
            transition: background 0.12s;
        }
        .lx-row:hover { background: #f7f9fa; }
        .lx-row .dot { flex-shrink: 0; width: 6px; height: 6px; background: #1d6df2; border-radius: 50%; opacity: 0.7; }
        .lx-row .name { font-weight: 600; color: #1a202c; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lx-row .sub { font-size: 0.78rem; color: #a0aec0; font-weight: 500; margin-left: auto; white-space: nowrap; }

        .lx-empty { text-align: center; padding: 3rem; color: #a0aec0; }

        @media (max-width: 900px) {
            .lx-hero { padding: 7rem 1.25rem 2rem; }
            .lx-hero h1 { font-size: 2rem; letter-spacing: -1px; }
            .lx-toolbar { padding: 1rem 1.25rem; }
            .lx-toolbar input[type="search"] { min-width: 100%; flex: 1 0 100%; }
            .lx-toolbar-count { margin-left: 0; }
            .lx-wrap { padding: 2rem 1.25rem 4rem; }
            .lx-letter-head h2 { font-size: 1.5rem; }
            .lx-row-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <section class="lx-hero">
        <h1>All Minnesota <span>lakes</span>.</h1>
        <p>Alphabetical index of every lake in our directory. Looking for a place to live instead? Browse by lake town — it's where agents and local businesses aggregate.</p>
        <div class="pillrow">
            <a href="/towns"><span aria-hidden="true">🗺️</span> Browse lake towns (map)</a>
        </div>
    </section>

    <div class="lx-toolbar-wrap">
        <div class="lx-toolbar">
            <input type="search" id="lx-search" placeholder="Search by lake name…" oninput="applyFilters()">
            <select id="lx-region" onchange="applyFilters()">
                <option value="">All regions</option>
            </select>
            <span id="lx-count" class="lx-toolbar-count"></span>
        </div>
    </div>

    <section class="lx-wrap">
        <div id="lx-content">
            <div class="lx-empty">Loading lakes…</div>
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        let _lakes = [];

        async function loadLakes() {
            try {
                const res = await fetch('/api/lakes');
                if (!res.ok) throw new Error();
                _lakes = await res.json();
                populateRegions();
                applyFilters();
            } catch (_) {
                document.getElementById('lx-content').innerHTML = '<div class="lx-empty">Could not load lakes.</div>';
            }
        }

        function populateRegions() {
            const sel = document.getElementById('lx-region');
            const regions = [...new Set(_lakes.map(l => l.region).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">All regions</option>' +
                regions.map(r => `<option value="${escHtml(r)}">${escHtml(r)}</option>`).join('');
            // Honor ?region= and ?search= deep-link params
            const qp = new URLSearchParams(location.search).get('region');
            if (qp && regions.includes(qp)) sel.value = qp;
            const qs = new URLSearchParams(location.search).get('search');
            if (qs) document.getElementById('lx-search').value = qs;
        }

        function filtered() {
            const search = (document.getElementById('lx-search').value || '').toLowerCase().trim();
            const region = document.getElementById('lx-region').value;
            return _lakes.filter(l => {
                if (region && l.region !== region) return false;
                if (search && !l.name.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function applyFilters() {
            const rows = filtered();
            render(rows);
            document.getElementById('lx-count').textContent = `${rows.length} of ${_lakes.length} lakes`;
        }

        function firstAlphaChar(name) {
            // Group "Lake Minnetonka" under M, "Gull Lake" under G — i.e. use the
            // first non-"Lake" word, or fall back to the first char otherwise.
            const stripped = String(name || '').replace(/^\s*Lake\s+/i, '').trim();
            const c = (stripped || name || '').trim().charAt(0).toUpperCase();
            return /[A-Z]/.test(c) ? c : '#';
        }

        function render(rows) {
            const container = document.getElementById('lx-content');
            if (!rows.length) {
                container.innerHTML = '<div class="lx-empty">No lakes match your filters.</div>';
                return;
            }
            // Sort by the alphabetization key (first non-Lake word), then group by letter
            const sorted = [...rows].sort((a, b) => {
                const an = String(a.name).replace(/^\s*Lake\s+/i, '').toLowerCase();
                const bn = String(b.name).replace(/^\s*Lake\s+/i, '').toLowerCase();
                return an.localeCompare(bn);
            });
            const groups = {};
            sorted.forEach(l => {
                const key = firstAlphaChar(l.name);
                (groups[key] ||= []).push(l);
            });
            const letters = Object.keys(groups).sort();

            container.innerHTML = letters.map(letter => `
                <div class="lx-letter">
                    <div class="lx-letter-head">
                        <h2>${escHtml(letter)}</h2>
                        <span class="count">${groups[letter].length} lake${groups[letter].length === 1 ? '' : 's'}</span>
                    </div>
                    <div class="lx-row-grid">
                        ${groups[letter].map(l => `
                            <a class="lx-row" href="/lakes/${encodeURIComponent(l.slug)}">
                                <span class="dot" aria-hidden="true"></span>
                                <span class="name">${escHtml(l.name)}</span>
                                <span class="sub">${escHtml(l.region || l.county || '')}</span>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        document.addEventListener('DOMContentLoaded', loadLakes);
    </script>
</body>
</html>
