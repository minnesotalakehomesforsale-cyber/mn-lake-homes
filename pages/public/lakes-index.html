<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <title>Minnesota Lakes Directory | Lake Homes Real Estate</title>
    <meta name="description" content="Explore every Minnesota lake on our interactive map. Find homes, agents, and local businesses on Lake Minnetonka, Gull Lake, Mille Lacs, Lake Vermilion, and more.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://minnesotalakehomesforsale.com/lakes">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Minnesota Lakes Directory">
    <meta property="og:description" content="Interactive map of every Minnesota lake in our directory — homes for sale, agents, marinas, and more.">

    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet: free OSM-based map library. Tiles via Stadia Maps. -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="../../components/components.js" defer></script>

    <style>
        .lx-hero { padding: 9rem 2rem 3rem; background-color: var(--bg-dark); color: #fff; text-align: center; }
        .lx-hero h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -1.5px; line-height: 1.1; margin: 0 0 1rem; }
        .lx-hero h1 span { color: var(--accent-blue); }
        .lx-hero p { font-size: 1.15rem; color: #a0aec0; max-width: 700px; margin: 0 auto 2rem; line-height: 1.6; }

        .lx-main { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 6rem; }
        .lx-toolbar { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
        .lx-toolbar input, .lx-toolbar select { font-family: inherit; font-size: 0.95rem; padding: 0.65rem 1rem; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; outline: none; }
        .lx-toolbar input:focus, .lx-toolbar select:focus { border-color: #1d6df2; }
        .lx-toolbar input[type="search"] { flex: 1; min-width: 240px; }

        #lx-map { height: 600px; width: 100%; border-radius: 16px; border: 1px solid #edf2f7; overflow: hidden; margin-bottom: 2rem; }

        .lx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .lx-card { background: #fff; border: 1px solid #edf2f7; border-radius: 14px; padding: 1.5rem; text-decoration: none; color: inherit; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s; display: block; }
        .lx-card:hover { border-color: #1d6df2; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
        .lx-card h3 { font-size: 1.25rem; font-weight: 700; color: #1a202c; margin: 0 0 0.35rem; letter-spacing: -0.25px; }
        .lx-card .meta { color: #718096; font-size: 0.85rem; margin: 0 0 0.85rem; }
        .lx-card p { color: #4a5568; font-size: 0.92rem; line-height: 1.55; margin: 0; }

        @media (max-width: 900px) {
            .lx-hero { padding: 7rem 1.25rem 2rem; }
            .lx-hero h1 { font-size: 2.25rem; letter-spacing: -1px; }
            .lx-main { padding: 2rem 1.25rem 4rem; }
            #lx-map { height: 420px; }
        }
    </style>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <section class="lx-hero">
        <h1>Every Minnesota <span>lake</span> — one map.</h1>
        <p>Click a pin to dive into that lake's real estate, local agents, and everything that makes living on it special.</p>
    </section>

    <main class="lx-main">
        <div class="lx-toolbar">
            <input type="search" id="lx-search" placeholder="Search by lake name…" oninput="applyFilters()">
            <select id="lx-region" onchange="applyFilters()">
                <option value="">All regions</option>
            </select>
        </div>

        <div id="lx-map"></div>

        <div id="lx-grid" class="lx-grid">
            <div style="grid-column:1/-1;text-align:center;padding:2rem;color:#a0aec0;">Loading lakes…</div>
        </div>
    </main>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        let _lakes = [];
        let _map = null;
        let _markers = [];

        async function loadLakes() {
            try {
                const res = await fetch('/api/lakes');
                if (!res.ok) throw new Error('fetch failed');
                _lakes = await res.json();
                populateRegions();
                applyFilters();
            } catch (_) {
                document.getElementById('lx-grid').innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#a0aec0;">Could not load lakes.</div>';
            }
        }

        function populateRegions() {
            const sel = document.getElementById('lx-region');
            const regions = [...new Set(_lakes.map(l => l.region).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">All regions</option>' +
                regions.map(r => `<option value="${escHtml(r)}">${escHtml(r)}</option>`).join('');
        }

        function filtered() {
            const search = (document.getElementById('lx-search').value || '').toLowerCase().trim();
            const region = document.getElementById('lx-region').value;
            return _lakes.filter(l => {
                if (region && l.region !== region) return false;
                if (search && !l.name.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function applyFilters() {
            const rows = filtered();
            renderMap(rows);
            renderGrid(rows);
        }

        function ensureMap() {
            if (_map) return _map;
            _map = L.map('lx-map', { zoomControl: true, scrollWheelZoom: false }).setView([46.3, -94.3], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            }).addTo(_map);
            return _map;
        }

        function renderMap(rows) {
            const map = ensureMap();
            _markers.forEach(m => map.removeLayer(m));
            _markers = [];
            const bounds = [];
            rows.forEach(l => {
                if (l.latitude == null || l.longitude == null) return;
                const marker = L.marker([l.latitude, l.longitude]).addTo(map);
                marker.bindPopup(`
                    <div style="font-family:'Inter',sans-serif;min-width:180px;">
                        <div style="font-weight:700;font-size:1rem;color:#1a202c;margin-bottom:0.25rem;">${escHtml(l.name)}</div>
                        ${l.region ? `<div style="font-size:0.78rem;color:#718096;margin-bottom:0.6rem;">${escHtml(l.region)}</div>` : ''}
                        <a href="/lakes/${encodeURIComponent(l.slug)}" style="display:inline-block;padding:0.4rem 0.8rem;background:#1d6df2;color:#fff;font-weight:700;border-radius:6px;text-decoration:none;font-size:0.8rem;">Open page →</a>
                    </div>
                `);
                _markers.push(marker);
                bounds.push([l.latitude, l.longitude]);
            });
            if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 8 });
        }

        function renderGrid(rows) {
            const grid = document.getElementById('lx-grid');
            if (!rows.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#a0aec0;">No lakes match your filters.</div>';
                return;
            }
            grid.innerHTML = rows.map(l => `
                <a class="lx-card" href="/lakes/${encodeURIComponent(l.slug)}">
                    <h3>${escHtml(l.name)}</h3>
                    <div class="meta">${escHtml(l.region || l.county || l.state || '')}</div>
                    <p>${escHtml(l.intro_text || l.seo_description || '')}</p>
                </a>
            `).join('');
        }

        function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        document.addEventListener('DOMContentLoaded', loadLakes);
    </script>
</body>
</html>
