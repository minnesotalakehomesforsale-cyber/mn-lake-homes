<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password | MN Lake Homes</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        body { background-color: #fff; color: #1a202c; display: block; min-height: 100vh; }
        .signup-split { display: grid; grid-template-columns: minmax(360px, 520px) 1fr; min-height: 100vh; }
        .signup-left { display: flex; flex-direction: column; padding: 2.5rem 3rem; overflow-y: auto; }
        .signup-brand { display: inline-flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 1.05rem; letter-spacing: -0.3px; color: #1a202c; text-decoration: none; margin-bottom: 3.5rem; }
        .signup-brand svg { color: #1a202c; }
        .signup-form-wrap { max-width: 400px; width: 100%; margin: auto 0; padding-bottom: 2rem; }
        .signup-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin: 0 0 0.5rem; color: #1a202c; }
        .signup-header p { font-size: 0.95rem; color: #718096; line-height: 1.55; margin: 0 0 2rem; }
        .signup-form { display: flex; flex-direction: column; gap: 1.1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-label { font-size: 0.78rem; font-weight: 700; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { padding: 0.85rem 1rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; color: #1a202c; outline: none; transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit; }
        .form-input:focus { border-color: #1d6df2; box-shadow: 0 0 0 3px rgba(29,109,242,0.12); }
        .signup-submit { background: #1d6df2; color: #fff; border: 0; border-radius: 10px; padding: 0.95rem 1.25rem; font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 0.5rem; }
        .signup-submit:hover { background: #155bc8; }
        .signup-submit:disabled { opacity: 0.6; cursor: default; }
        .new-note { font-size: 0.85rem; color: #4a5568; text-align: center; margin: 1rem 0 0; }
        .new-note a { color: #1d6df2; font-weight: 600; text-decoration: none; }
        .signup-alert { padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; margin-bottom: 1rem; display: none; }
        .signup-alert.ok  { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; display: block; }
        .signup-alert.err { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; display: block; }
        .signup-right { background-image: url('/assets/images/mn-aerial-small-town.jpg'); background-size: cover; background-position: center; }
        .pw-hint { font-size: 0.78rem; color: #a0aec0; margin-top: 0.3rem; }
        @media (max-width: 900px) {
            .signup-split { grid-template-columns: 1fr; }
            .signup-right { display: none; }
            .signup-left { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="signup-split">
        <div class="signup-left">
            <a href="/index.html" class="signup-brand">
                <svg width="24" height="22" viewBox="0 0 100 88" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4,52 50,10 96,52"/><polyline points="72,28 72,16 84,16 84,42"/><polyline points="17,52 17,82 83,82 83,52"/>
                </svg>
                MinnesotaLakeHomesForSale.com
            </a>

            <div class="signup-form-wrap">
                <div class="signup-header">
                    <h1>Set a new password</h1>
                    <p id="header-sub">Pick a strong password — at least 8 characters. You'll be signed out of every device once it's saved.</p>
                </div>

                <div id="alert" class="signup-alert"></div>

                <form id="reset-form" class="signup-form" onsubmit="handleReset(event)">
                    <div class="form-group">
                        <label class="form-label" for="new-password">New password</label>
                        <input type="password" id="new-password" class="form-input" placeholder="••••••••" autocomplete="new-password" minlength="8" required>
                        <div class="pw-hint">Minimum 8 characters. Avoid anything you've reused on another site.</div>
                    </div>

                    <button type="submit" class="signup-submit" id="submit-btn">Save new password</button>
                    <p class="new-note"><a href="/login">Back to sign in</a></p>
                </form>
            </div>
        </div>
        <div class="signup-right" aria-hidden="true"></div>
    </div>

    <script>
        const TOKEN = new URLSearchParams(window.location.search).get('token');

        if (!TOKEN) {
            const a = document.getElementById('alert');
            a.textContent = 'This reset link is missing its token. Request a new one from the forgot-password page.';
            a.classList.add('err');
            document.getElementById('submit-btn').disabled = true;
        }

        async function handleReset(event) {
            event.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('submit-btn');
            const pw1 = document.getElementById('new-password').value;
            alertEl.className = 'signup-alert';

            if (pw1.length < 8) {
                alertEl.textContent = 'Password must be at least 8 characters.';
                alertEl.classList.add('err');
                return;
            }

            btn.disabled = true; btn.textContent = 'Saving…';
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: TOKEN, new_password: pw1 }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || 'Reset failed.');
                alertEl.textContent = 'Password updated. Redirecting to sign in…';
                alertEl.classList.add('ok');
                setTimeout(() => { window.location.href = '/login'; }, 1500);
            } catch (err) {
                alertEl.textContent = err.message;
                alertEl.classList.add('err');
                btn.disabled = false;
                btn.textContent = 'Save new password';
            }
        }
    </script>
</body>
</html>
