<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <title>You're Live! | MinnesotaLakeHomesForSale.com</title>
    <meta name="description" content="Your agent membership is active. Your profile is now published on MinnesotaLakeHomesForSale.com and you can start receiving leads.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .page-header {
            padding: 12rem 2rem 5rem;
            text-align: center;
            background-color: var(--bg-dark);
            color: #fff;
        }
        .page-title {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
        }
        .page-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .success-section {
            padding: 5rem 2rem 8rem;
            background-color: #fff;
            color: #000;
        }

        .success-wrapper {
            max-width: 580px;
            margin: 0 auto;
            text-align: center;
        }

        .success-icon {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #f0fff4;
            border: 2px solid #c6f6d5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }

        .success-heading {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1a202c;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .success-message {
            font-size: 1.1rem;
            color: #4a5568;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .success-cta {
            display: inline-block;
            background: #1d6df2;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 1rem 2.25rem;
            border-radius: 12px;
            text-decoration: none;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .success-cta:hover {
            background: #155bc8;
        }

        .success-secondary {
            display: block;
            margin-top: 1.25rem;
            color: #1d6df2;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.15s;
        }
        .success-secondary:hover {
            color: #155bc8;
        }

        @media (max-width: 900px) {
            .page-header { padding: 8rem 1.25rem 3rem; }
            .page-title { font-size: 3rem; letter-spacing: -1.25px; }
            .page-subtitle { font-size: 1rem; }
            .success-section { padding: 3.5rem 1.25rem 5rem; }
            .success-heading { font-size: 2rem; }
            .success-message { font-size: 1rem; }
        }
        @media (max-width: 480px) {
            .page-title { font-size: 2.25rem; }
            .success-heading { font-size: 1.75rem; }
            .success-icon { width: 72px; height: 72px; }
            .success-icon svg { width: 32px; height: 32px; }
        }
    </style>
    <script src="../../components/components.js" defer></script>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <div class="page-header">
        <h1 class="page-title">Welcome Aboard</h1>
        <p class="page-subtitle">Your membership has been activated successfully.</p>
    </div>

    <section class="success-section">
        <div class="success-wrapper">
            <div class="success-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>

            <h2 class="success-heading">You're live!</h2>

            <p class="success-message">Your membership is active and your profile is now published on MinnesotaLakeHomesForSale.com.</p>

            <a href="/pages/agent/dashboard.html" class="success-cta">Go to my dashboard</a>

            <a href="/pages/public/agents.html" class="success-secondary">View my public profile &rarr;</a>
        </div>
    </section>

    <global-footer></global-footer>

</body>
</html>
