<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="robots" content="noindex, nofollow">

    <title>Agent Sign In | MinnesotaLakeHomesForSale.com</title>
    <meta name="description" content="Sign in to your Minnesota Lake Homes agent portal. Access leads, manage your profile, and track your performance.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        html, body { min-height: 100vh; -webkit-font-smoothing: antialiased; }

        .login-split {
            display: grid;
            grid-template-columns: 480px 1fr;
            min-height: 100vh;
        }

        /* ── Left: form ── */
        .login-left {
            display: flex;
            flex-direction: column;
            padding: 2.5rem 3rem;
            background: #fff;
        }

        .login-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 1rem;
            color: #1a202c;
            text-decoration: none;
            margin-bottom: 1rem;
        }
        .login-brand svg { color: #1a202c; }

        .login-form-wrap {
            max-width: 360px;
            width: 100%;
            margin: auto 0;
        }

        .login-form-wrap h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #1a202c;
            margin-bottom: 0.4rem;
        }
        .login-form-wrap .login-sub {
            color: #718096;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.4rem;
        }
        .field input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            background: #fff;
            color: #1a202c;
        }
        .field input:focus {
            outline: none;
            border-color: #1d6df2;
            box-shadow: 0 0 0 3px rgba(29, 109, 242, 0.12);
        }

        .login-alert {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .login-alert.error   { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .login-alert.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }

        .login-submit {
            width: 100%;
            padding: 0.9rem;
            font-size: 0.95rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #1a202c;
            color: #fff;
            font-family: inherit;
            transition: background 0.2s;
            margin-top: 0.25rem;
        }
        .login-submit:hover:not(:disabled) { background: #2d3748; }
        .login-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .login-links {
            margin-top: 1.75rem;
            font-size: 0.88rem;
            color: #718096;
        }
        .login-links a {
            color: #1a202c;
            font-weight: 600;
            text-decoration: none;
        }
        .login-links a:hover { text-decoration: underline; }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
            color: #cbd5e0;
            font-size: 0.78rem;
            font-weight: 500;
        }
        .login-divider::before, .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #edf2f7;
        }

        .login-alt-btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 0.88rem;
            font-weight: 600;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            color: #1a202c;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: border-color 0.2s, background 0.2s;
            font-family: inherit;
        }
        .login-alt-btn:hover { border-color: #cbd5e0; background: #f7f9fa; }

        .login-footer {
            display: flex;
            gap: 2rem;
            justify-content: center;
            padding-top: 2rem;
            font-size: 0.78rem;
            color: #a0aec0;
        }
        .login-footer a { color: #718096; text-decoration: none; }
        .login-footer a:hover { color: #1a202c; }

        /* ── Right: tagline ── */
        .login-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            background: #fafbfc;
            border-left: 1px solid #edf2f7;
        }
        .login-right h2 {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1a202c;
            letter-spacing: -2px;
            line-height: 1.1;
            max-width: 520px;
        }

        @media (max-width: 960px) {
            .login-split { grid-template-columns: 1fr; }
            .login-right { display: none; }
            .login-left { padding: 2rem 1.5rem; }
        }
        @media (max-width: 480px) {
            .login-form-wrap h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="login-split">

        <div class="login-left">
            <a href="/index.html" class="login-brand">
                <svg width="24" height="22" viewBox="0 0 100 88" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4,52 50,10 96,52"/>
                    <polyline points="72,28 72,16 84,16 84,42"/>
                    <polyline points="17,52 17,82 83,82 83,52"/>
                </svg>
                MN Lake Homes
            </a>

            <div class="login-form-wrap">
                <h1>Agent Sign In</h1>
                <p class="login-sub">Access your leads, profile editor, and performance dashboard.</p>

                <div id="login-alert" class="login-alert"></div>

                <form id="login-form" onsubmit="handleAgentLogin(event)">
                    <div class="field">
                        <label for="agent-email">Email address</label>
                        <input type="email" id="agent-email" placeholder="you@email.com" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label for="agent-password">Password</label>
                        <input type="password" id="agent-password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="login-submit" id="login-submit">Sign in</button>
                </form>

                <p class="login-links">
                    New to the network? <a href="#" onclick="openForm('agent'); return false;">Apply to join &rarr;</a>
                </p>

                <div class="login-divider">OR</div>

                <a class="login-alt-btn" href="signup.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Sign up as a homeowner
                </a>

                <div class="login-footer">
                    <a href="contact.html">Support</a>
                    <a href="faq.html">FAQs</a>
                    <span>(218) 850-1115</span>
                </div>
            </div>
        </div>

        <div class="login-right">
            <h2>One login across your leads, profile, and analytics</h2>
        </div>

    </div>

    <script src="../../components/components.js"></script>
    <script>
        // If already logged in, redirect to the right dashboard
        fetch('/api/auth/session', { credentials: 'include' })
            .then(r => { if (r.ok) return r.json(); throw new Error(); })
            .then(data => {
                if (data.role === 'super_admin' || data.role === 'admin') {
                    window.location.href = '../admin/dashboard.html';
                } else if (data.role === 'agent') {
                    window.location.href = '../agent/dashboard.html';
                }
            })
            .catch(() => {});

        async function handleAgentLogin(e) {
            e.preventDefault();
            const alertEl = document.getElementById('login-alert');
            const btn = document.getElementById('login-submit');
            const email = document.getElementById('agent-email').value.trim();
            const password = document.getElementById('agent-password').value;

            alertEl.style.display = 'none';
            alertEl.className = 'login-alert';
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    alertEl.textContent = data.error || 'Invalid email or password.';
                    alertEl.classList.add('error');
                    alertEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign in';
                    return;
                }

                alertEl.textContent = `Welcome back, ${data.display_name || data.email}! Redirecting…`;
                alertEl.classList.add('success');
                alertEl.style.display = 'block';

                setTimeout(() => {
                    if (data.role === 'super_admin' || data.role === 'admin') {
                        window.location.href = '../admin/dashboard.html';
                    } else {
                        window.location.href = '../agent/dashboard.html';
                    }
                }, 800);

            } catch (err) {
                alertEl.textContent = 'Network error. Please try again.';
                alertEl.classList.add('error');
                alertEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        }
    </script>
</body>
</html>
