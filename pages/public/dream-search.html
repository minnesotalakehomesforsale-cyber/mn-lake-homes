<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Describe Your Dream Lake Home | MN Lake Homes</title>
    <meta name="description" content="Tell us about your ideal Minnesota lake home in plain words — we'll find matching listings and connect you with a local expert.">
    <link rel="canonical" href="https://minnesotalakehomesforsale.com/find-a-home">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="../../styles/style.css">
    <script src="../../components/components.js" defer></script>
    <style>
        html, body { margin: 0; background: #f7f9fa; }
        .ds-wrap { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
        .ds-hero { text-align: center; max-width: 660px; margin: 0 auto 1.75rem; }
        .ds-hero h1 { font-size: clamp(1.9rem, 5vw, 2.8rem); font-weight: 800; letter-spacing: -1.5px; color: #0f2b46; margin: 0 0 0.5rem; }
        .ds-hero p { color: #4a5568; font-size: 1.05rem; line-height: 1.6; margin: 0; }
        .ds-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.25rem; box-shadow: 0 10px 30px rgba(16,24,40,0.06); max-width: 720px; margin: 0 auto; }
        .ds-box textarea { width: 100%; box-sizing: border-box; font: inherit; font-size: 1.05rem; border: none; outline: none; resize: none; min-height: 76px; color: #1a202c; }
        .ds-actions { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .ds-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .ds-chip { background: #edf2f7; border: none; border-radius: 99px; padding: 0.35rem 0.8rem; font: inherit; font-size: 0.8rem; font-weight: 600; color: #4a5568; cursor: pointer; }
        .ds-go { background: #1d6df2; color: #fff; border: none; border-radius: 10px; padding: 0.75rem 1.6rem; font: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .ds-go:disabled { opacity: 0.6; cursor: default; }
        .ds-crit { text-align: center; color: #718096; font-size: 0.9rem; margin: 1.5rem 0 0; }
        .ds-crit b { color: #1d6df2; }
        .ds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
        .ds-card { background: #fff; border: 1px solid #edf2f7; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; display: block; transition: box-shadow .15s, transform .15s; }
        .ds-card:hover { box-shadow: 0 8px 22px rgba(16,24,40,0.1); transform: translateY(-2px); }
        .ds-card .img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #eef2f7; display: block; }
        .ds-card .b { padding: 0.7rem 0.85rem 0.9rem; }
        .ds-card .p { font-weight: 800; color: #0f2b46; font-size: 1.1rem; }
        .ds-card .t { color: #2d3748; font-size: 0.9rem; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ds-card .m { color: #a0aec0; font-size: 0.8rem; margin-top: 0.2rem; }
        .ds-cta { background: linear-gradient(135deg,#0f2b46,#1d6df2); color: #fff; border-radius: 16px; padding: 1.75rem; text-align: center; margin-top: 2rem; }
        .ds-cta h2 { margin: 0 0 0.4rem; } .ds-cta p { margin: 0 0 1.1rem; opacity: 0.92; }
        .ds-cta a { display: inline-block; background: #fff; color: #1d6df2; font-weight: 700; text-decoration: none; border-radius: 10px; padding: 0.7rem 1.5rem; }
        .ds-state { text-align: center; color: #a0aec0; padding: 2.5rem 1rem; }
        @media (max-width:600px){ .ds-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; } }
    </style>
</head>
<body>
    <global-header></global-header>
    <main class="ds-wrap">
        <div class="ds-hero">
            <h1>Describe your dream lake home</h1>
            <p>Tell us what you're looking for in plain words — we'll find matching homes and connect you with a local lake expert.</p>
        </div>
        <div class="ds-box">
            <textarea id="ds-q" placeholder="e.g. A 3-bedroom cabin right on a quiet fishing lake near Brainerd, under $500k"></textarea>
            <div class="ds-actions">
                <div class="ds-chips" id="ds-chips"></div>
                <button class="ds-go" id="ds-go" onclick="runSearch()">Find my home →</button>
            </div>
        </div>
        <div id="ds-results"></div>
    </main>
    <global-footer></global-footer>

    <script>
        const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        const money = n => n == null ? 'Contact for price' : '$' + Number(n).toLocaleString('en-US');
        const thumb = u => (typeof u === 'string' && u.includes('/upload/')) ? u.replace('/upload/', '/upload/w_500,h_375,c_fill,q_auto,f_auto/') : u;
        const EXAMPLES = [
            'Waterfront cabin under $400k near Brainerd',
            '4-bed family home on Lake Minnetonka',
            'Quiet fishing lake, 2+ beds, under $300k',
            'Modern lakefront with lots of shoreline',
        ];
        document.getElementById('ds-chips').innerHTML = EXAMPLES.map(e => `<button class="ds-chip" onclick="useExample('${e.replace(/'/g,"\\'")}')">${esc(e)}</button>`).join('');
        window.useExample = e => { document.getElementById('ds-q').value = e; runSearch(); };

        function critLine(c) {
            const parts = [];
            if (c.property_type) parts.push(esc(c.property_type));
            if (c.min_beds) parts.push(c.min_beds + '+ beds');
            if (c.waterfront) parts.push('waterfront');
            if (c.place) parts.push('near ' + esc(c.place));
            if (c.min_price || c.max_price) {
                const lo = c.min_price ? '$' + Number(c.min_price).toLocaleString('en-US') : '';
                const hi = c.max_price ? '$' + Number(c.max_price).toLocaleString('en-US') : '';
                parts.push(lo && hi ? `${lo}–${hi}` : lo ? `${lo}+` : `under ${hi}`);
            }
            return parts.length ? 'Searching for: <b>' + parts.join('</b> · <b>') + '</b>' : '';
        }

        async function runSearch() {
            const q = document.getElementById('ds-q').value.trim();
            if (!q) return;
            const box = document.getElementById('ds-results');
            const btn = document.getElementById('ds-go'); btn.disabled = true;
            box.innerHTML = '<div class="ds-state">Finding your matches…</div>';
            try {
                const r = await fetch('/api/dream/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: q }) });
                const d = await r.json();
                if (!r.ok) throw new Error(d.error || 'Search failed.');
                const crit = critLine(d.criteria || {});
                const cards = (d.listings || []).map(l => `
                    <a class="ds-card" href="/listings/${esc(l.slug)}">
                        ${l.featured_image_url ? `<img class="img" src="${esc(thumb(l.featured_image_url))}" alt="" loading="lazy">` : '<div class="img"></div>'}
                        <div class="b"><div class="p">${money(l.price)}</div><div class="t">${esc(l.title)}</div>
                        <div class="m">${[l.beds != null ? l.beds + ' bd' : '', l.baths != null ? l.baths + ' ba' : '', esc(l.city || '')].filter(Boolean).join(' · ')}</div></div>
                    </a>`).join('');
                const results = d.listings && d.listings.length
                    ? `<div class="ds-grid">${cards}</div>`
                    : '<div class="ds-state">No exact matches yet — but a local agent can hunt for you (including homes not yet listed).</div>';
                box.innerHTML = (crit ? `<p class="ds-crit">${crit}</p>` : '')
                    + results
                    + `<div class="ds-cta"><h2>Want a local expert on the hunt?</h2><p>Get matched with a vetted agent who knows these lakes — they'll send options that fit, including off-market homes.</p><a href="/pages/public/buy.html?intent=${encodeURIComponent(q).slice(0,300)}">Get matched with an agent →</a></div>`;
            } catch (e) { box.innerHTML = `<div class="ds-state" style="color:#c53030;">${esc(e.message)}</div>`; }
            finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
