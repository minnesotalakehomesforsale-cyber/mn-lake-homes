<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | MN Lake Homes</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f7f9fa;
            color: #1a202c;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .login-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 1.5rem;
            margin-top: 80px; /* Offset for header */
        }

        .login-card {
            background: #fff;
            max-width: 440px;
            width: 100%;
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid #edf2f7;
            position: relative;
            overflow: hidden;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #718096;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        .form-submit {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            background-color: #1a202c;
            color: #fff;
        }

        .form-submit.agent {
            background-color: var(--accent-blue);
        }

        .form-submit:hover {
            opacity: 0.9;
        }

        .alert-box {
            display: none;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
        }

        .alert-error { background-color: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .alert-success { background-color: #f0fff4; color: #2f855a; border: 1px solid #9ae6b4; }

        /* Toggles */
        .portal-section { display: none; }
        .portal-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-links {
            text-align: center;
            margin-top: 2rem;
        }

        .create-act {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #edf2f7;
        }

        .create-act a {
            color: #1a202c;
            font-weight: 600;
            text-decoration: underline;
        }

        .switch-portal {
            font-size: 0.85rem;
            color: #a0aec0;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .switch-portal:hover {
            color: var(--accent-blue);
        }

    </style>
</head>
<body>

    <global-header></global-header>

    <div class="login-wrap">
        <div class="login-card">
            
            <!-- CLIENT PORTAL (Default) -->
            <div id="client-portal" class="portal-section active">
                <div class="login-header">
                    <h1>Client Portal</h1>
                    <p>Track your saved homes & property valuations.</p>
                </div>
                <div id="client-alert" class="alert-box"></div>
                <form onsubmit="handleLogin(event, 'client')">
                    <div class="form-group">
                        <label class="form-label" for="client-email">Email Address</label>
                        <input type="email" id="client-email" class="form-input" placeholder="you@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="client-password">Password</label>
                        <input type="password" id="client-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="form-submit">Sign In</button>
                </form>
                <div class="bottom-links">
                    <div class="create-act">
                        Don't have an account? <a href="#">Register here</a>
                    </div>
                    <button class="switch-portal" onclick="togglePortal('agent')">Agent & Partner Login</button>
                </div>
            </div>

            <!-- AGENT PORTAL -->
            <div id="agent-portal" class="portal-section">
                <div class="login-header">
                    <h1>Agent Portal</h1>
                    <p>Access your listings, leads, and analytics.</p>
                </div>
                <div id="agent-alert" class="alert-box"></div>
                <form onsubmit="handleLogin(event, 'agent')">
                    <div class="form-group">
                        <label class="form-label" for="agent-email">Work Email</label>
                        <input type="email" id="agent-email" class="form-input" placeholder="agent@mnlakehomes.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="agent-password">Password</label>
                        <input type="password" id="agent-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="form-submit agent">Agent Sign In</button>
                </form>
                <div class="bottom-links">
                    <div class="create-act">
                        Not in the network? <a href="join.html">Apply to join</a>
                    </div>
                    <button class="switch-portal" onclick="togglePortal('client')">&larr; Back to Client Login</button>
                </div>
            </div>

        </div>
    </div>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script src="../../components/components.js"></script>
    <script>
        function togglePortal(target) {
            document.querySelectorAll('.portal-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`${target}-portal`).classList.add('active');
        }

        // Auto-switch to agent portal if ?portal=agent or ?admin=1 in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('portal') === 'agent' || urlParams.get('admin') === '1') {
            togglePortal('agent');
        }

        // If already logged in, redirect away from login page
        fetch('/api/auth/session')
            .then(r => { if (r.ok) return r.json(); throw new Error('not_logged_in'); })
            .then(data => {
                if (data.role === 'super_admin' || data.role === 'admin') {
                    window.location.href = '../admin/dashboard.html';
                } else if (data.role === 'agent') {
                    window.location.href = '../agent/dashboard.html';
                } else {
                    window.location.href = '../../index.html';
                }
            })
            .catch(() => { /* Not logged in — stay on login page */ });

        async function handleLogin(e, type) {
            e.preventDefault();

            const alertBox = document.getElementById(`${type}-alert`);
            const submitBtn = e.target.querySelector('.form-submit');
            const email = document.getElementById(`${type}-email`).value.trim();
            const password = document.getElementById(`${type}-password`).value;

            alertBox.style.display = 'none';
            submitBtn.innerHTML = 'Signing in...';
            submitBtn.style.opacity = '0.7';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    alertBox.className = 'alert-box alert-error';
                    alertBox.textContent = data.error || 'Authentication failed.';
                    alertBox.style.display = 'block';
                    submitBtn.innerHTML = type === 'agent' ? 'Agent Sign In' : 'Sign In';
                    submitBtn.style.opacity = '1';
                    submitBtn.disabled = false;
                    return;
                }

                alertBox.className = 'alert-box alert-success';
                alertBox.textContent = `Welcome back, ${data.display_name || data.email}! Redirecting...`;
                alertBox.style.display = 'block';

                setTimeout(() => {
                    if (data.role === 'super_admin' || data.role === 'admin') {
                        window.location.href = '../admin/dashboard.html';
                    } else if (data.role === 'agent') {
                        window.location.href = '../agent/dashboard.html';
                    } else {
                        window.location.href = '../../index.html';
                    }
                }, 1000);

            } catch (err) {
                alertBox.className = 'alert-box alert-error';
                alertBox.textContent = 'Network error. Please try again.';
                alertBox.style.display = 'block';
                submitBtn.innerHTML = type === 'agent' ? 'Agent Sign In' : 'Sign In';
                submitBtn.style.opacity = '1';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
