<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | MN Lake Homes</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f7f9fa;
            color: #1a202c;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .login-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 1.5rem;
            margin-top: 80px; /* Offset for header */
        }

        .split-card {
            background: #fff;
            max-width: 900px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid #edf2f7;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .login-side {
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
        }

        .client-side {
            background: #fff;
        }

        .agent-side {
            background: #1a202c;
            color: #fff;
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .client-side .login-header h1 { color: #1a202c; }
        .agent-side .login-header h1 { color: #fff; }

        .client-side .login-header p { color: #718096; }
        .agent-side .login-header p { color: #a0aec0; }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .client-side .form-label { color: #4a5568; }
        .agent-side .form-label { color: #e2e8f0; }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .client-side .form-input {
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #1a202c;
        }

        .agent-side .form-input {
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        .form-submit {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .client-btn {
            background-color: #1a202c;
            color: #fff;
        }
        .client-btn:hover { background-color: #2d3748; }

        .agent-btn {
            background-color: var(--accent-blue);
            color: #fff;
        }
        .agent-btn:hover { background-color: #2b6cb0; }

        .alert-box {
            display: none;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
        }

        .alert-error { background-color: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .alert-success { background-color: #f0fff4; color: #2f855a; border: 1px solid #9ae6b4; }

        @media (max-width: 768px) {
            .split-card { grid-template-columns: 1fr; }
            .login-side { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>

    <global-header></global-header>

    <div class="login-wrap">
        <div class="split-card">
            
            <!-- Client Side -->
            <div class="login-side client-side">
                <div class="login-header">
                    <h1>Client Portal</h1>
                    <p>Track your saved homes & property valuations.</p>
                </div>

                <div id="client-alert" class="alert-box"></div>

                <form id="client-form" onsubmit="handleLogin(event, 'client')">
                    <div class="form-group">
                        <label class="form-label" for="client-email">Email Address</label>
                        <input type="email" id="client-email" class="form-input" placeholder="you@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="client-password">Password</label>
                        <input type="password" id="client-password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="form-submit client-btn">Client Sign In</button>
                </form>

                <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: #718096;">
                    Don't have an account? <a href="#" style="color: #1a202c; font-weight: 600; text-decoration: underline;">Register here</a>
                </div>
            </div>

            <!-- Agent Side -->
            <div class="login-side agent-side">
                <div class="login-header">
                    <h1>Agent & Partner</h1>
                    <p>Access your listings, leads, and analytics.</p>
                </div>

                <div id="agent-alert" class="alert-box"></div>

                <form id="agent-form" onsubmit="handleLogin(event, 'agent')">
                    <div class="form-group">
                        <label class="form-label" for="agent-email">Work Email</label>
                        <input type="email" id="agent-email" class="form-input" placeholder="agent@mnlakehomes.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="agent-password">Password</label>
                        <input type="password" id="agent-password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="form-submit agent-btn">Agent Sign In</button>
                </form>

                <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: #a0aec0;">
                    Not in the network? <a href="join.html" style="color: #fff; font-weight: 600; text-decoration: underline;">Apply to join</a>
                </div>
            </div>

        </div>
    </div>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script src="../../components/components.js"></script>
    <script>
        function handleLogin(e, type) {
            e.preventDefault();
            
            const alertBox = document.getElementById(`${type}-alert`);
            const submitBtn = e.target.querySelector('.form-submit');
            const email = document.getElementById(`${type}-email`).value;
            
            submitBtn.innerHTML = 'Authenticating...';
            submitBtn.style.opacity = '0.7';
            submitBtn.disabled = true;

            // MOCK LOGIC for frontend demonstration
            setTimeout(() => {
                alertBox.className = 'alert-box alert-success';
                alertBox.textContent = 'Authentication successful! Routing...';
                alertBox.style.display = 'block';

                setTimeout(() => {
                    if (type === 'agent') {
                        if (email.includes('admin')) {
                            window.location.href = '../admin/dashboard.html';
                        } else {
                            window.location.href = '../agent/dashboard.html';
                        }
                    } else {
                        // Client routing bypass mock
                        window.location.href = '../../index.html'; 
                    }
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
