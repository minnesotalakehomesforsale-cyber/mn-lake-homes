    <style>
        .blog-index-header {
            padding: 12rem 2rem 5rem;
            text-align: center;
            background-color: var(--bg-dark);
            color: #fff;
        }
        .blog-index-title {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            overflow-wrap: break-word;
        }
        .blog-index-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .blog-card { text-decoration: none; color: inherit; display: block; }
        .blog-card:hover .blog-title { color: var(--accent-blue, #1d6df2); }
        .blog-card:hover .blog-image img { transform: scale(1.03); }
        .blog-image { overflow: hidden; border-radius: 12px; aspect-ratio: 16/10; height: auto; width: 100%; margin-bottom: 1.25rem; }
        .blog-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
        .blog-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
        .blog-tag { background: #ebf4ff; color: #1d6df2; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.65rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .blog-time { display: flex; align-items: center; gap: 0.35rem; color: #718096; font-size: 0.82rem; font-weight: 500; }
        .blog-title { font-size: 1.25rem; font-weight: 700; color: #1a202c; line-height: 1.4; margin-bottom: 0.5rem; transition: color 0.15s; }
        .blog-excerpt { color: #718096; font-size: 0.9rem; line-height: 1.6; }
        .blog-filter-btn { padding: 0.5rem 1rem; border-radius: 99px; border: 1px solid #e2e8f0; background: #fff; font-size: 0.85rem; font-weight: 600; color: #4a5568; cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
        .blog-filter-btn:hover { border-color: #1d6df2; color: #1d6df2; }
        .blog-filter-btn.active { background: #1d6df2; border-color: #1d6df2; color: #fff; }

        .blog-controls {
            max-width: 1200px;
            margin: 0 auto 2.75rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .blog-search-wrap { position: relative; flex: 1; min-width: 240px; }
        .blog-search-wrap .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            pointer-events: none;
        }
        .blog-search-wrap input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .blog-search-wrap input:focus {
            border-color: #1d6df2;
            box-shadow: 0 0 0 3px rgba(29,109,242,0.12);
        }
        .blog-tag-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .blog-result-count { color: #a0aec0; font-size: 0.85rem; margin: -1.5rem 0 2rem; }

        .blog-index-section { padding: 5rem 2rem 6rem !important; }
        #blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 3rem; }

        @media (max-width: 900px) {
            .blog-index-header { padding: 7rem 1.25rem 3rem; }
            .blog-index-title { font-size: 2.75rem; letter-spacing: -1.25px; line-height: 1.05; }
            .blog-index-subtitle { font-size: 1.02rem; }
            .blog-index-section { padding: 3.5rem 1.25rem 4rem !important; }
            #blog-grid { grid-template-columns: 1fr; gap: 1.75rem; }
            .blog-image { aspect-ratio: 16/9; height: auto; margin-bottom: 1rem; }
            .blog-title { font-size: 1.15rem; }
            .blog-excerpt { font-size: 0.88rem; }
        }
        @media (max-width: 480px) {
            .blog-index-header { padding: 6rem 1rem 2.5rem; }
            .blog-index-title { font-size: 2rem; letter-spacing: -1px; }
            .blog-index-subtitle { font-size: 0.95rem; }
            .blog-index-section { padding: 2.75rem 1rem 3rem !important; }
            #blog-grid { gap: 1.5rem; }
            .blog-meta { gap: 0.6rem; }
        }
    </style>
    <script src="../../components/components.js" defer></script>
</head>
<body style="background-color: #fff;">
    <global-header></global-header>

    <div class="blog-index-header">
        <h1 class="blog-index-title">Advice and inspiration</h1>
        <p class="blog-index-subtitle">Stories, strategies, and buyer guides built to help you find and enjoy your perfect Minnesota lakefront property.</p>
    </div>

    <section class="blog-section blog-index-section">
        <div class="blog-container">
            <div class="blog-controls">
                <div class="blog-search-wrap">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input id="blog-search" type="search" placeholder="Search articles by keyword…" autocomplete="off" aria-label="Search articles">
                </div>
                <div class="blog-tag-filters" id="blog-tag-filters" role="group" aria-label="Filter by category"></div>
            </div>
            <p class="blog-result-count" id="blog-result-count" hidden></p>
            <div id="blog-grid">
                <div style="grid-column: 1/-1; text-align:center; padding: 3rem; color: #a0aec0;">Loading posts...</div>
            </div>
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        const clockSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

        function buildCard(p) {
            return `
                <a href="/pages/public/blog-post.html?slug=${p.slug}" class="blog-card">
                    <div class="blog-image">
                        <img src="${p.cover_image_url || '/assets/images/beach-style-exterior.jpg'}" alt="${p.title}" loading="lazy" width="800" height="500">
                    </div>
                    <div class="blog-meta">
                        <span class="blog-tag">${p.tag || 'General'}</span>
                        <span class="blog-time">${clockSVG} Read: ${p.read_time_minutes || 4} minutes</span>
                    </div>
                    <h3 class="blog-title">${p.title}</h3>
                    ${p.excerpt ? `<p class="blog-excerpt">${p.excerpt}</p>` : ''}
                </a>`;
        }

        let allPosts = [];
        let activeTag = 'All';
        let searchQuery = '';

        function applyFilters() {
            const grid = document.getElementById('blog-grid');
            const countEl = document.getElementById('blog-result-count');
            const q = searchQuery.trim().toLowerCase();

            const filtered = allPosts.filter(p => {
                const tagOk = activeTag === 'All' || (p.tag || 'General') === activeTag;
                if (!tagOk) return false;
                if (!q) return true;
                const haystack = `${p.title || ''} ${p.excerpt || ''} ${p.tag || ''}`.toLowerCase();
                return haystack.includes(q);
            });

            if (!filtered.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#a0aec0;">No articles match your search. Try a different keyword or category.</div>';
            } else {
                grid.innerHTML = filtered.map(buildCard).join('');
            }

            // Only show the count when the reader has actually narrowed things down.
            if (q || activeTag !== 'All') {
                countEl.hidden = false;
                countEl.textContent = `${filtered.length} ${filtered.length === 1 ? 'article' : 'articles'}` +
                    (activeTag !== 'All' ? ` in “${activeTag}”` : '') +
                    (q ? ` matching “${searchQuery.trim()}”` : '');
            } else {
                countEl.hidden = true;
            }
        }

        function buildTagFilters() {
            const wrap = document.getElementById('blog-tag-filters');
            const tags = ['All', ...Array.from(new Set(allPosts.map(p => p.tag || 'General'))).sort()];
            wrap.innerHTML = tags.map(t =>
                `<button type="button" class="blog-filter-btn${t === activeTag ? ' active' : ''}" data-tag="${t.replace(/"/g, '&quot;')}">${t}</button>`
            ).join('');
            wrap.querySelectorAll('.blog-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeTag = btn.dataset.tag;
                    wrap.querySelectorAll('.blog-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
                    applyFilters();
                });
            });
        }

        async function loadPosts() {
            const grid = document.getElementById('blog-grid');
            try {
                const res = await fetch('/api/blog');
                if (!res.ok) throw new Error();
                allPosts = await res.json();
                if (!allPosts.length) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#a0aec0;">No posts yet.</div>';
                    return;
                }
                buildTagFilters();
                applyFilters();

                const searchInput = document.getElementById('blog-search');
                searchInput.addEventListener('input', e => {
                    searchQuery = e.target.value;
                    applyFilters();
                });
            } catch (err) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#a0aec0;">Could not load posts.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
