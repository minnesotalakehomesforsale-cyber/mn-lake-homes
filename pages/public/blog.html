<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN Lake Homes Blog</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .blog-index-header {
            padding: 12rem 2rem 5rem;
            text-align: center;
            background-color: var(--bg-dark);
            color: #fff;
        }
        .blog-index-title {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
        }
        .blog-index-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .blog-card { text-decoration: none; color: inherit; display: block; }
        .blog-card:hover .blog-title { color: var(--accent-blue, #1d6df2); }
        .blog-card:hover .blog-image img { transform: scale(1.03); }
        .blog-image { overflow: hidden; border-radius: 12px; aspect-ratio: 16/10; margin-bottom: 1.25rem; }
        .blog-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
        .blog-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
        .blog-tag { background: #ebf4ff; color: #1d6df2; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.65rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .blog-time { display: flex; align-items: center; gap: 0.35rem; color: #718096; font-size: 0.82rem; font-weight: 500; }
        .blog-title { font-size: 1.25rem; font-weight: 700; color: #1a202c; line-height: 1.4; margin-bottom: 0.5rem; transition: color 0.15s; }
        .blog-excerpt { color: #718096; font-size: 0.9rem; line-height: 1.6; }
    </style>
    <script src="../../components/components.js" defer></script>
</head>
<body style="background-color: #fff;">
    <global-header></global-header>

    <div class="blog-index-header">
        <h1 class="blog-index-title">Advice and inspiration</h1>
        <p class="blog-index-subtitle">Stories, strategies, and buyer guides built to help you find and enjoy your perfect Minnesota lakefront property.</p>
    </div>

    <section class="blog-section" style="padding-top: 5rem; padding-bottom: 6rem;">
        <div class="blog-container">
            <div id="blog-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 3rem;">
                <div style="grid-column: 1/-1; text-align:center; padding: 3rem; color: #a0aec0;">Loading posts...</div>
            </div>
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        const clockSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

        async function loadPosts() {
            const grid = document.getElementById('blog-grid');
            try {
                const res = await fetch('/api/blog');
                if (!res.ok) throw new Error();
                const posts = await res.json();

                if (!posts.length) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#a0aec0;">No posts yet.</div>';
                    return;
                }

                grid.innerHTML = posts.map(p => `
                    <a href="/pages/public/blog-post.html?slug=${p.slug}" class="blog-card">
                        <div class="blog-image">
                            <img src="${p.cover_image_url || 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1200'}" alt="${p.title}" loading="lazy">
                        </div>
                        <div class="blog-meta">
                            <span class="blog-tag">${p.tag || 'General'}</span>
                            <span class="blog-time">${clockSVG} Read: ${p.read_time_minutes || 4} minutes</span>
                        </div>
                        <h3 class="blog-title">${p.title}</h3>
                        ${p.excerpt ? `<p class="blog-excerpt">${p.excerpt}</p>` : ''}
                    </a>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#a0aec0;">Could not load posts.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
