    <style>
        .blog-index-header {
            padding: 12rem 2rem 5rem;
            text-align: center;
            background-color: var(--bg-dark);
            color: #fff;
        }
        .blog-index-title {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            line-height: 1.05;
        }
        .blog-index-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .agents-bottom-cta {
            padding: 8rem 2rem;
            background-color: var(--bg-dark);
            color: #fff;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .agents-bottom-cta-inner { max-width: 700px; margin: 0 auto; }
        .agents-bottom-cta h2 {

        .agents-bottom-cta p {

        }
        .agents-bottom-cta .btn {
            padding: 1.25rem 3rem;

        @media (max-width: 900px) {
            .blog-index-header { padding: 8rem 1.25rem 3.5rem; }
            .blog-index-title { font-size: 3rem; letter-spacing: -1.25px; }
            .blog-index-subtitle { font-size: 1.05rem; }
            .agents-bottom-cta { padding: 5rem 1.25rem; }
            .agents-bottom-cta h2 { font-size: 2.5rem; }
            .agents-bottom-cta h2 br { display: none; }
            .agents-bottom-cta p { font-size: 1rem; margin-bottom: 2rem; }
            .agents-bottom-cta .btn { width: 100%; padding: 1.1rem 1.5rem; font-size: 1rem; }
        }
        @media (max-width: 480px) {
            .blog-index-title { font-size: 2.25rem; letter-spacing: -1px; }
            .agents-bottom-cta h2 { font-size: 2rem; }
        }

        /* Top Agent corner badge on cards */
        .top-agent-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: linear-gradient(135deg, #1d6df2 0%, #155bc8 100%);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0.35rem 0.7rem;
            border-radius: 99px;

        }
        .top-agent-badge svg { display: block; }
    </style>
    <script src="../../components/components.js" defer></script>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <!-- Hero: exact copy of blog.html header -->
    <div class="blog-index-header">
        <h1 class="blog-index-title">Find an Agent</h1>
        <p class="blog-index-subtitle">Meet the local experts who know Minnesota's lakes better than anyone else.</p>
    </div>

    <!-- Agent Grid -->
    <section style="background-color: #f7f9fa; padding: 5rem 0 6rem;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 2rem;">
            <div id="agent-directory-grid" class="agents-grid" style="padding-top: 0;">
                <!-- JS injects .agent-card elements here -->
            </div>
        </div>
    </section>

    <!-- Bottom CTA -->
    <section class="agents-bottom-cta">
        <div class="agents-bottom-cta-inner">
            <h2>Can't find the right fit?<br>We'll find them for you.</h2>
            <p>Tell us what you're looking for and our team will personally match you with the best local specialist for your goals, lake, and budget.</p>
            <button onclick="openForm('agent')" class="btn btn-primary">Find my perfect agent</button>
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        function buildCard(agent) {
            const photoUrl = agent.profile_photo_url ||
                '/assets/images/mn-stillwater-aerial.webp';
            const title = agent.membership_badge || 'Lake Specialist';
            const fullBio = agent.bio || 'A dedicated Minnesota lake home specialist ready to help you find your perfect waterfront property.';
            const shortBio = fullBio.length > 120 ? fullBio.slice(0, 120).trimEnd() + '…' : fullBio;

            const topBadge = agent.is_featured
                ? `<div class="top-agent-badge" title="Top Agent — featured on MN Lake Homes">
                       <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                       <span>Top Agent</span>
                   </div>`
                : '';

            const inlineTopIcon = agent.is_featured
                ? `<svg style="vertical-align:-2px; margin-left:0.4rem; color:#1d6df2;" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-label="Top Agent"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`
                : '';

            const card = document.createElement('a');
            card.href = `agent-profile.html?slug=${agent.slug}`;
            card.style.cssText = 'text-decoration:none;color:inherit;display:block;';
            card.className = 'agent-link-wrapper';
            card.innerHTML = `
                <div class="agent-card" style="position:relative;">
                    ${topBadge}
                    <img src="${photoUrl}" alt="${agent.display_name} — Minnesota lake home specialist" class="agent-image" loading="lazy" width="600" height="600">
                    <div class="agent-info">
                        <h3 class="agent-name">${agent.display_name}${inlineTopIcon}</h3>
                        <div class="agent-title">${title.toUpperCase()}</div>
                        <p class="agent-bio">${shortBio}</p>
                    </div>
                </div>`;
            return card;
        }

        async function renderDirectory() {
            const grid = document.getElementById('agent-directory-grid');
            const featuredOnly = new URLSearchParams(window.location.search).get('featured') === '1';

            // Update hero heading if we're in featured mode
            if (featuredOnly) {
                const headerTitle = document.querySelector('.blog-index-title, .agents-hero-title, h1');
                if (headerTitle) headerTitle.textContent = 'Featured Agents';
                const headerSub = document.querySelector('.blog-index-subtitle, .agents-hero-sub');
                if (headerSub) headerSub.textContent = 'Our top-rated Minnesota lake home specialists, hand-picked and vetted.';
            }

            try {
                const res = await fetch('/api/agents/public');
                if (!res.ok) { grid.innerHTML = '<p style="color:#c53030;padding:2rem;">Could not load agents. Please try again later.</p>'; return; }
                let agents = await res.json();
                if (featuredOnly) agents = agents.filter(a => a.is_featured);
                if (agents.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column:1/-1;background:#f7f9fa;border:1px solid #edf2f7;border-radius:14px;padding:3rem 2rem;text-align:center;max-width:680px;margin:0 auto;">
                            <div style="display:inline-flex;align-items:center;gap:0.4rem;background:#ebf4ff;color:#1d6df2;font-size:0.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:0.35rem 0.75rem;border-radius:99px;margin-bottom:1rem;">Beta Release</div>
                            <h3 style="font-size:1.5rem;font-weight:700;color:#1a202c;margin:0 0 0.6rem;letter-spacing:-0.4px;">
                                ${featuredOnly ? 'Featured agents coming soon' : 'Agents coming soon'}
                            </h3>
                            <p style="color:#4a5568;line-height:1.6;margin:0 0 1.5rem;font-size:1rem;">We're actively onboarding lake specialists across Minnesota. We're in beta — new agents join every week. Tell us which lake you're interested in and we'll reach out the moment a local specialist is ready for you.</p>
                            <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
                                <a href="contact.html" style="display:inline-block;padding:0.8rem 1.5rem;background:#1d6df2;color:#fff;font-weight:700;border-radius:8px;text-decoration:none;font-size:0.9rem;">Contact us →</a>
                                ${featuredOnly ? '<a href="agents.html" style="display:inline-block;padding:0.8rem 1.5rem;background:#fff;color:#1a202c;font-weight:700;border:1px solid #e2e8f0;border-radius:8px;text-decoration:none;font-size:0.9rem;">See all agents</a>' : ''}
                            </div>
                        </div>`;
                    return;
                }
                grid.innerHTML = '';
                agents.forEach(a => grid.appendChild(buildCard(a)));
            } catch (err) {
                console.error('Directory render error:', err);
                grid.innerHTML = '<p style="color:#c53030;padding:2rem;">Failed to load agent directory.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', renderDirectory);
    </script>

</body>
</html>
