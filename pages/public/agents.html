<body style="background-color: #fff;">

            <input id="ag-search" type="search" placeholder="Search by agent name, brokerage, or city…" autocomplete="off">
        </div>

    <!-- Filter row — plain in-flow block; scrolls with the page -->

        <label class="ag-ctrl ag-ctrl-select" for="ag-filter-area">
            <select id="ag-filter-area" aria-label="Service area">
                <option value="">All service areas</option>
                <!-- populated from /api/tags -->
            </select>
        </label>

            <select id="ag-filter-state" aria-label="State">
                <option value="">All states</option>

        </label>

    <!-- Agent Grid -->
    <section style="background-color: #f7f9fa; padding: 3rem 0 5rem;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 2rem;">
            <div id="agent-directory-grid" class="agents-grid" style="padding-top: 0;">
                <!-- JS injects .agent-card elements here -->
            </div>
        </div>
    </section>

    <!-- Bottom CTA -->
    <section class="agents-bottom-cta">
        <div class="agents-bottom-cta-inner">
            <h2>Can't find the right fit?<br>We'll find them for you.</h2>
            <p>Tell us what you're looking for and our team will personally match you with the best local specialist for your goals, lake, and budget.</p>
            <button onclick="openForm('agent')" class="btn btn-primary">Find my perfect agent</button>
        </div>

    <global-footer></global-footer>

    <script>
        const state = {
            all:        [],    // full agent list from API
            search:     '',
            area:       '',    // tag slug
            stateCode:  '',
            featured:   false,
        };
        let _searchTimer = null;

        function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        // Featured = pays $39 (Prime) or $149 (Elite), or a manual admin
        // feature. Featured agents get the blue "Lake Specialist" badge/star
        // and appear in the featured sections. Basic ($9) agents are plain
        // "Agent" cards with no badge.
        function isFeaturedAgent(a) {
            const code = a.membership_code || '';
            return !!a.is_featured || ['mn_lake_specialist', 'top_agent', 'premium', 'founder'].includes(code);
        }

        function buildCard(agent) {
            const photoUrl = agent.profile_photo_url || '/assets/images/agent-placeholder.svg';
            const featured = isFeaturedAgent(agent);
            const title = featured ? 'Lake Specialist' : 'Agent';
            const fullBio = agent.bio || 'A dedicated Minnesota lake home specialist ready to help you find your perfect waterfront property.';
            const shortBio = fullBio.length > 120 ? fullBio.slice(0, 120).trimEnd() + '…' : fullBio;

            const starSvg = (w) => `<svg width="${w}" height="${w}" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;

            // "Serves" chips — prefer geo tags, fall back to free-text service areas.
            const areas = Array.isArray(agent.geo_tags) && agent.geo_tags.length
                ? agent.geo_tags.map(t => t.name)
                : (Array.isArray(agent.service_areas) ? agent.service_areas : []);
            const servesChips = areas.slice(0, 3).map(n => `<span class="ac-chip">${escHtml(n)}</span>`).join('')
                + (areas.length > 3 ? `<span class="ac-chip ac-chip--more">+${areas.length - 3}</span>` : '');
            const initials = escHtml((agent.display_name || '?').trim().split(/\s+/).map(s => s[0]).slice(0, 2).join('').toUpperCase());
            const avatar = agent.profile_photo_url
                ? `<img src="${escHtml(agent.profile_photo_url)}" alt="${escHtml(agent.display_name)}" loading="lazy">`
                : `<span class="ac-initials">${initials}</span>`;
            const featBadge = featured ? `<span class="ac-badge" title="Lake Specialist">${starSvg(11)}</span>` : '';
            const yrs = Number(agent.years_experience);
            const years = yrs > 0 ? `<div class="ac-years">${yrs} year${yrs === 1 ? '' : 's'} experience</div>` : '';
            const broker = agent.brokerage_name ? `<div class="ac-broker">${escHtml(agent.brokerage_name)}</div>` : '';

            const card = document.createElement('a');
            card.href = `/agents/${encodeURIComponent(agent.slug)}`;
            card.style.cssText = 'text-decoration:none;color:inherit;display:block;';
            card.className = 'agent-link-wrapper';
            card.innerHTML = `
                <div class="agent-card ac-v2">
                    <div class="ac-head">
                        <div class="ac-avatar">${avatar}${featBadge}</div>
                        <div class="ac-id">
                            <h3 class="ac-name">${escHtml(agent.display_name)}</h3>
                            ${broker}
                            ${years}
                        </div>
                    </div>
                    <p class="ac-bio">${escHtml(shortBio)}</p>
                    ${areas.length ? `<div class="ac-serves"><span class="ac-serves-label">Serves</span><div class="ac-chips">${servesChips}</div></div>` : ''}
                    <span class="ac-btn">View Profile</span>
                </div>`;
            return card;
        }

        function renderEmpty(grid) {
            const featuredOnly = state.featured;
            grid.innerHTML = `
                <div class="ag-empty">
                    <div style="display:inline-flex;align-items:center;gap:0.4rem;background:#ebf4ff;color:#1d6df2;font-size:0.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:0.35rem 0.75rem;border-radius:99px;margin-bottom:1rem;">No matches</div>
                    <h3 style="font-size:1.5rem;font-weight:700;color:#1a202c;margin:0 0 0.6rem;letter-spacing:-0.4px;">
                        ${featuredOnly ? 'No featured agents for these filters' : 'No agents match these filters'}
                    </h3>
                    <p style="color:#4a5568;line-height:1.6;margin:0 0 1.5rem;font-size:1rem;">Try a different area or clear your filters. We're actively onboarding lake specialists across Minnesota &mdash; if your lake isn't covered yet, tell us which one and we'll reach out when a local is ready.</p>
                    <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
                        <a href="#" onclick="event.preventDefault(); clearAllFilters();" style="display:inline-block;padding:0.8rem 1.5rem;background:#1d6df2;color:#fff;font-weight:700;border-radius:8px;text-decoration:none;font-size:0.9rem;">Clear filters</a>
                        <a href="/pages/public/contact.html" style="display:inline-block;padding:0.8rem 1.5rem;background:#fff;color:#1a202c;font-weight:700;border:1px solid #e2e8f0;border-radius:8px;text-decoration:none;font-size:0.9rem;">Tell us which lake →</a>
                    </div>
                </div>`;
        }

        function applyFilters() {
            const grid = document.getElementById('agent-directory-grid');
            const q = state.search.toLowerCase();

            const filtered = state.all.filter(a => {
                if (state.featured  && !isFeaturedAgent(a)) return false;
                if (state.area) {
                    const tags = Array.isArray(a.geo_tags) ? a.geo_tags : [];
                    if (!tags.some(t => t && t.slug === state.area)) return false;
                }
                if (state.stateCode) {
                    const tags = Array.isArray(a.geo_tags) ? a.geo_tags : [];
                    if (!tags.some(t => t && t.state === state.stateCode)) return false;
                }
                if (q) {
                    const hay = [a.display_name, a.brokerage_name, a.city, a.bio, a.service_areas].join(' ').toLowerCase();
                    if (!hay.includes(q)) return false;
                }
                return true;
            });

            // Don't expose the raw total (reads sparse for a young network). Show a
            // neutral label normally; only show a count when a filter is narrowing.
            const countEl = document.getElementById('ag-result-count');
            if (filtered.length < state.all.length) {
                countEl.innerHTML = `Showing <strong>${filtered.length}</strong> ${filtered.length === 1 ? 'agent' : 'agents'}`;
            } else {
                countEl.textContent = 'Verified Minnesota lake agents';
            }

            if (!filtered.length) { renderEmpty(grid); return; }
            grid.innerHTML = '';
            grid.classList.toggle('agents-grid--few', filtered.length < 3);
            filtered.forEach(a => grid.appendChild(buildCard(a)));
        }

        async function loadAreas() {
            try {
                const res = await fetch('/api/tags?active=true');
                if (!res.ok) return;
                const tags = await res.json();
                const sel = document.getElementById('ag-filter-area');
                // Group by state for easier scanning at 200+ options.
                const byState = {};
                tags.forEach(t => { (byState[t.state] ||= []).push(t); });
                const states = Object.keys(byState).sort();
                sel.innerHTML = '<option value="">All service areas</option>' +
                    states.map(s => `
                        <optgroup label="${escHtml(s)}">
                            ${byState[s].sort((a,b) => a.name.localeCompare(b.name)).map(t =>
                                `<option value="${escHtml(t.slug)}">${escHtml(t.name)}</option>`
                            ).join('')}
                        </optgroup>
                    `).join('');
            } catch (_) { /* degrade silently; state dropdown still works */ }
        }

        async function loadDirectory() {
            const grid = document.getElementById('agent-directory-grid');
            try {
                const res = await fetch('/api/agents/public');
                if (!res.ok) throw new Error('directory fetch failed');
                state.all = await res.json();
                applyFilters();
            } catch (err) {
                console.error('Directory render error:', err);
                grid.innerHTML = '<p style="color:#c53030;padding:2rem;">Failed to load agent directory.</p>';
            }
        }

        function clearAllFilters() {
            state.search    = '';
            state.area      = '';
            state.stateCode = '';
            state.featured  = false;
            document.getElementById('ag-search').value = '';
            document.getElementById('ag-filter-area').value = '';
            document.getElementById('ag-filter-state').value = '';
            const fbtn = document.getElementById('ag-filter-featured');
            fbtn.classList.remove('active');
            fbtn.setAttribute('aria-pressed', 'false');
            applyFilters();
        }

        // ── Wire controls ───────────────────────────────────────────────
        document.getElementById('ag-search').addEventListener('input', e => {
            clearTimeout(_searchTimer);
            _searchTimer = setTimeout(() => {
                state.search = e.target.value.trim();
                applyFilters();
            }, 180);
        });
        document.getElementById('ag-filter-area').addEventListener('change', e => {
            state.area = e.target.value;
            applyFilters();
        });
        document.getElementById('ag-filter-state').addEventListener('change', e => {
            state.stateCode = e.target.value;
            applyFilters();
        });
        document.getElementById('ag-filter-featured').addEventListener('click', () => {
            state.featured = !state.featured;
            const fbtn = document.getElementById('ag-filter-featured');
            fbtn.classList.toggle('active', state.featured);
            fbtn.setAttribute('aria-pressed', String(state.featured));
            applyFilters();
        });

        // ── Boot ────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            // Preserve the legacy ?featured=1 deep-link from the header
            // "Featured Agents" megamenu entry.
            if (new URLSearchParams(window.location.search).get('featured') === '1') {
                state.featured = true;
                const fbtn = document.getElementById('ag-filter-featured');
                fbtn.classList.add('active');
                fbtn.setAttribute('aria-pressed', 'true');
                document.getElementById('ag-hero-title').textContent = 'Featured Agents';
                document.getElementById('ag-hero-sub').textContent = 'Our top-rated Minnesota lake home specialists, hand-picked and vetted.';
            }
            loadAreas();
            loadDirectory();
        });
    </script>

</body>
</html>
