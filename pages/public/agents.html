<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Directory | MN Lake Homes</title>
    <meta name="description" content="Browse Minnesota's top lake home specialists. Find a verified agent who knows your lake, your market, and your goals.">
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .blog-index-header {
            padding: 12rem 2rem 5rem;
            text-align: center;
            background-color: var(--bg-dark);
            color: #fff;
        }
        .blog-index-title {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
        }
        .blog-index-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
    <script src="../../components/components.js" defer></script>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <!-- Hero: exact copy of blog.html header -->
    <div class="blog-index-header">
        <h1 class="blog-index-title">Find an Agent</h1>
        <p class="blog-index-subtitle">Meet the local experts who know Minnesota's lakes better than anyone else.</p>
    </div>

    <!-- Agent Grid: exact same classes as homepage Featured Agents section -->
    <section style="background-color: #f7f9fa; padding: 6rem 0;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 2rem;">
            <div id="agent-directory-grid" class="agents-grid" style="padding-top: 0;">
                <!-- JS injects .agent-card elements here -->
            </div>
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        async function renderDirectory() {
            const grid = document.getElementById('agent-directory-grid');

            try {
                const res = await fetch('/api/agents/public');

                if (!res.ok) {
                    grid.innerHTML = '<p style="color:#c53030; padding: 2rem;">Could not load agents. Please try again later.</p>';
                    return;
                }

                const agents = await res.json();

                if (agents.length === 0) {
                    grid.innerHTML = '<p style="color:#718096; padding: 2rem;">No agents are currently listed. Check back soon.</p>';
                    return;
                }

                agents.forEach(agent => {
                    const photoUrl = agent.profile_photo_url ||
                        'https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=800&auto=format&fit=crop';

                    const title = agent.membership_badge || 'Lake Specialist';

                    const card = document.createElement('a');
                    card.href = `agent-profile.html?slug=${agent.slug}`;
                    card.style.textDecoration = 'none';
                    card.style.color = 'inherit';
                    card.style.display = 'block';
                    card.className = 'agent-link-wrapper';

                    const fullBio = agent.bio || 'A dedicated Minnesota lake home specialist ready to help you find your perfect waterfront property.';
                    const shortBio = fullBio.length > 120 ? fullBio.slice(0, 120).trimEnd() + '…' : fullBio;

                    card.innerHTML = `
                        <div class="agent-card">
                            <img src="${photoUrl}" alt="${agent.display_name}" class="agent-image">
                            <div class="agent-info">
                                <h3 class="agent-name">${agent.display_name}</h3>
                                <div class="agent-title">${title.toUpperCase()}</div>
                                <p class="agent-bio">${shortBio}</p>
                            </div>
                        </div>
                    `;

                    grid.appendChild(card);
                });

            } catch (err) {
                console.error('Directory render error:', err);
                grid.innerHTML = '<p style="color:#c53030; padding: 2rem;">Failed to load agent directory.</p>';
            }
        }

        function openModal() {
            document.getElementById('lead-modal').classList.add('active');
            nextModalStep(1);
        }
        function closeModal() {
            document.getElementById('lead-modal').classList.remove('active');
        }
        function nextModalStep(step) {
            document.querySelectorAll('.modal-step').forEach(el => el.classList.remove('active'));
            document.getElementById('modal-step-' + step).classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', renderDirectory);
    </script>

</body>
</html>
