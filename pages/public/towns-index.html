<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <title>Minnesota Lake Towns Directory | Lake Homes Real Estate</title>
    <meta name="description" content="Every town in our Minnesota lake network — find homes, agents, and local businesses in Wayzata, Excelsior, Brainerd, Detroit Lakes, Walker, and more.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://minnesotalakehomesforsale.com/towns">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Minnesota Lake Towns Directory">
    <meta property="og:description" content="Every town connected to a Minnesota lake in our directory — homes for sale, agents, and local businesses.">

    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="../../components/components.js" defer></script>

    <style>
        .tx-hero { padding: 9rem 2rem 3rem; background-color: var(--bg-dark); color: #fff; text-align: center; }
        .tx-hero h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -1.5px; line-height: 1.1; margin: 0 0 1rem; }
        .tx-hero h1 span { color: var(--accent-blue); }
        .tx-hero p { font-size: 1.15rem; color: #a0aec0; max-width: 700px; margin: 0 auto 2rem; line-height: 1.6; }

        .tx-toolbar-wrap { background: #f7f9fa; border-bottom: 1px solid #edf2f7; }
        .tx-toolbar { max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
        .tx-toolbar input, .tx-toolbar select { font-family: inherit; font-size: 0.95rem; padding: 0.7rem 1rem; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
        .tx-toolbar input:focus, .tx-toolbar select:focus { border-color: #1d6df2; box-shadow: 0 0 0 3px rgba(29,109,242,0.12); }
        .tx-toolbar input[type="search"] { flex: 1; min-width: 260px; }
        .tx-toolbar-count { margin-left: auto; font-size: 0.85rem; color: #718096; font-weight: 600; }

        /* Map — full bleed */
        .tx-map-section { position: relative; width: 100%; }
        #tx-map { height: 560px; width: 100%; background: #eef2f5; border-top: 1px solid #edf2f7; border-bottom: 1px solid #edf2f7; }
        .leaflet-control-attribution {
            background: rgba(255,255,255,0.85) !important;
            backdrop-filter: blur(6px);
            font-family: 'Inter', sans-serif !important;
            font-size: 0.7rem !important;
            color: #718096 !important;
            padding: 0.2rem 0.55rem !important;
        }
        .leaflet-control-attribution a { color: #4a5568 !important; }
        .tx-pin {
            width: 22px; height: 22px;
            background: #1d6df2;
            border: 3px solid #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 5px 12px rgba(29,109,242,0.4);
            transition: transform 0.15s;
        }
        .tx-pin::after { content: ''; display: block; width: 6px; height: 6px; background: #fff; border-radius: 50%; margin: 5px auto; }
        .tx-pin-wrap:hover .tx-pin { transform: rotate(-45deg) scale(1.15); }

        .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 10px 28px rgba(0,0,0,0.14) !important; padding: 2px !important; }
        .leaflet-popup-content { margin: 0.9rem 1.1rem !important; font-family: 'Inter', sans-serif; }
        .tx-pop { min-width: 180px; }
        .tx-pop h4 { font-size: 1.02rem; font-weight: 700; color: #1a202c; margin: 0 0 0.2rem; letter-spacing: -0.2px; }
        .tx-pop .meta { font-size: 0.75rem; color: #718096; margin: 0 0 0.75rem; }
        .tx-pop a { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.48rem 0.9rem; background: #1d6df2; color: #fff !important; font-weight: 700; border-radius: 8px; text-decoration: none; font-size: 0.82rem; }
        .tx-pop a:hover { background: #155bc8; }

        .tx-grid-wrap { max-width: 1320px; margin: 0 auto; padding: 4rem 2rem 6rem; }
        .tx-grid-title { font-size: 2rem; font-weight: 700; color: #1a202c; letter-spacing: -0.75px; margin: 0 0 0.5rem; text-align: center; }
        .tx-grid-sub   { color: #718096; font-size: 1rem; max-width: 620px; margin: 0 auto 2.5rem; line-height: 1.6; text-align: center; }
        .tx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }

        /* Rich town card — mirrors the lake card on town-detail.html */
        .tx-card {
            display: flex; flex-direction: column;
            background: #fff; border: 1px solid #edf2f7; border-radius: 16px;
            overflow: hidden; text-decoration: none; color: inherit;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .tx-card:hover { transform: translateY(-4px); border-color: #cbd5e0; box-shadow: 0 16px 36px rgba(0,0,0,0.08); }
        .tx-card:hover .tx-card-cta { color: #155bc8; gap: 0.7rem; }
        .tx-card:hover .tx-card-thumb img { transform: scale(1.05); }
        .tx-card-thumb {
            height: 200px;
            background: linear-gradient(135deg, #1d6df2 0%, #155bc8 100%);
            overflow: hidden; position: relative;
        }
        .tx-card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
        .tx-card-thumb .chip {
            position: absolute; top: 14px; left: 14px; z-index: 2;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            color: #1a202c; font-size: 0.7rem; font-weight: 800;
            letter-spacing: 0.6px; text-transform: uppercase;
            padding: 0.3rem 0.65rem; border-radius: 6px;
        }
        .tx-card-body { padding: 1.3rem 1.5rem 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .tx-card-body h3 { font-size: 1.3rem; font-weight: 700; color: #1a202c; margin: 0 0 0.35rem; letter-spacing: -0.3px; }
        .tx-card-body .loc { font-size: 0.82rem; color: #a0aec0; margin: 0 0 0.85rem; }
        .tx-card-body p { color: #4a5568; font-size: 0.92rem; line-height: 1.55; margin: 0 0 1.1rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .tx-card-cta { margin-top: auto; display: inline-flex; align-items: center; gap: 0.45rem; font-size: 0.88rem; font-weight: 800; color: #1d6df2; transition: gap 0.15s, color 0.15s; }

        @media (max-width: 900px) {
            .tx-hero { padding: 7rem 1.25rem 2rem; }
            .tx-hero h1 { font-size: 2.25rem; letter-spacing: -1px; }
            .tx-toolbar { padding: 1rem 1.25rem; }
            .tx-toolbar input[type="search"] { min-width: 100%; flex: 1 0 100%; }
            .tx-toolbar-count { margin-left: 0; }
            #tx-map { height: 380px; }
            .tx-grid-wrap { padding: 2.5rem 1.25rem 4rem; }
            .tx-grid-title { font-size: 1.6rem; }
            .tx-grid { gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
            .tx-card-thumb { height: 170px; }
            .tx-card-body { padding: 1.1rem 1.25rem 1.25rem; }
            .tx-card-body h3 { font-size: 1.15rem; }
        }
        @media (max-width: 480px) {
            .tx-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <section class="tx-hero">
        <h1>Every Minnesota lake <span>town</span>.</h1>
        <p>Browse communities by lake, find local agents and businesses, and plan your move into Minnesota's most desirable waterfront neighborhoods.</p>
    </section>

    <div class="tx-toolbar-wrap">
        <div class="tx-toolbar">
            <input type="search" id="tx-search" placeholder="Search by town name…" oninput="applyFilters()">
            <select id="tx-region" onchange="applyFilters()">
                <option value="">All regions</option>
            </select>
            <span id="tx-count" class="tx-toolbar-count"></span>
        </div>
    </div>

    <section class="tx-map-section">
        <div id="tx-map"></div>
    </section>

    <section class="tx-grid-wrap">
        <h2 class="tx-grid-title">Browse lake towns</h2>
        <p class="tx-grid-sub">Each town links to its own page with connected lakes, local agents, and businesses.</p>
        <div id="tx-grid" class="tx-grid">
            <div style="grid-column:1/-1;text-align:center;padding:2rem;color:#a0aec0;">Loading towns…</div>
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        let _towns = [];
        let _map = null;
        let _markers = [];

        const TX_PIN_ICON = L.divIcon({
            className: 'tx-pin-wrap',
            html: '<div class="tx-pin"></div>',
            iconSize: [22, 30],
            iconAnchor: [11, 28],
            popupAnchor: [0, -26],
        });

        async function loadTowns() {
            try {
                const res = await fetch('/api/tags?with_lakes=true&active=true');
                if (!res.ok) throw new Error();
                _towns = await res.json();
                populateRegions();
                applyFilters();
            } catch (_) {
                document.getElementById('tx-grid').innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#a0aec0;">Could not load towns.</div>';
            }
        }

        function populateRegions() {
            const sel = document.getElementById('tx-region');
            const regions = [...new Set(_towns.map(t => t.region).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">All regions</option>' +
                regions.map(r => `<option value="${escHtml(r)}">${escHtml(r)}</option>`).join('');
        }

        function filtered() {
            const search = (document.getElementById('tx-search').value || '').toLowerCase().trim();
            const region = document.getElementById('tx-region').value;
            return _towns.filter(t => {
                if (region && t.region !== region) return false;
                if (search && !t.name.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function applyFilters() {
            const rows = filtered();
            renderMap(rows);
            renderGrid(rows);
            document.getElementById('tx-count').textContent = `${rows.length} of ${_towns.length} towns`;
        }

        function ensureMap() {
            if (_map) return _map;
            _map = L.map('tx-map', {
                zoomControl: true,
                scrollWheelZoom: true,
                center: [46.5, -94.3], zoom: 7,
                minZoom: 5, zoomSnap: 0.25,
                wheelPxPerZoomLevel: 110,
            });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
            }).addTo(_map);
            _map.attributionControl.setPrefix('<a href="https://leafletjs.com/" title="A JavaScript library for interactive maps">Leaflet</a>');
            return _map;
        }

        function renderMap(rows) {
            const map = ensureMap();
            _markers.forEach(m => map.removeLayer(m));
            _markers = [];
            const bounds = [];
            rows.forEach(t => {
                if (t.latitude == null || t.longitude == null) return;
                const marker = L.marker([t.latitude, t.longitude], { icon: TX_PIN_ICON }).addTo(map);
                marker.bindPopup(`
                    <div class="tx-pop">
                        <h4>${escHtml(t.name)}</h4>
                        ${t.region ? `<div class="meta">${escHtml(t.region)}${t.lake_count ? ` · ${t.lake_count} lake${t.lake_count === 1 ? '' : 's'}` : ''}</div>` : ''}
                        <a href="/towns/${encodeURIComponent(t.slug)}">Open page →</a>
                    </div>
                `);

                // Hover to preview, click to navigate.
                let hoverTimer = null;
                marker.on('mouseover', () => { clearTimeout(hoverTimer); marker.openPopup(); });
                marker.on('mouseout',  () => { hoverTimer = setTimeout(() => marker.closePopup(), 180); });
                marker.on('click',     () => { window.location.href = `/towns/${encodeURIComponent(t.slug)}`; });
                marker.on('popupopen', (e) => {
                    const el = e.popup.getElement();
                    if (!el) return;
                    el.addEventListener('mouseenter', () => clearTimeout(hoverTimer));
                    el.addEventListener('mouseleave', () => { hoverTimer = setTimeout(() => marker.closePopup(), 180); });
                });

                _markers.push(marker);
                bounds.push([t.latitude, t.longitude]);
            });
            if (bounds.length) map.fitBounds(bounds, { padding: [60, 60], maxZoom: 9 });
        }

        // Fallback image per region so cards vary instead of looking identical.
        const REGION_IMG = {
            'Twin Cities Metro': '/assets/images/mn-minneapolis-park-aerial.jpg',
            'Brainerd Lakes':    '/assets/images/mn-maple-lake-aerial.jpg',
            'Lakes Country':     '/assets/images/mn-chateau-aerial.jpg',
            'Iron Range':        '/assets/images/mn-stone-home-fall-maple.jpg',
            'Northern MN':       '/assets/images/mn-canoe-shore.webp',
            'Duluth Area':       '/assets/images/mn-adirondack-rocky-shore.jpg',
            'Southeast MN':      '/assets/images/mn-stucco-home-path.jpg',
            'Central MN':        '/assets/images/mn-aerial-small-town.jpg',
            'Fargo-Moorhead':    '/assets/images/mn-blue-farmhouse-country.jpg',
            'Red River Valley':  '/assets/images/mn-aerial-lake-homes.jpg',
        };
        const DEFAULT_IMG = '/assets/images/mn-canoe-shore.webp';

        function townBlurb(t) {
            const lakeBit = t.lake_count
                ? `Home to ${t.lake_count} lake${t.lake_count === 1 ? '' : 's'} in our directory.`
                : 'A Minnesota lake-adjacent community.';
            const regionBit = t.region
                ? ` Part of the ${t.region} region.`
                : '';
            return `${lakeBit}${regionBit} Connect with local agents, browse homes, and find trusted businesses serving ${t.name}.`;
        }

        function renderGrid(rows) {
            const grid = document.getElementById('tx-grid');
            if (!rows.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#a0aec0;">No towns match your filters.</div>';
                return;
            }
            grid.innerHTML = rows.map(t => {
                const thumb = REGION_IMG[t.region] || DEFAULT_IMG;
                const loc = [t.state, t.lake_count ? `${t.lake_count} lake${t.lake_count === 1 ? '' : 's'}` : null].filter(Boolean).join(' · ');
                return `
                    <a class="tx-card" href="/towns/${encodeURIComponent(t.slug)}">
                        <div class="tx-card-thumb">
                            ${t.region ? `<span class="chip">${escHtml(t.region)}</span>` : ''}
                            <img src="${escHtml(thumb)}" alt="${escHtml(t.name)}, ${escHtml(t.state || '')}" loading="lazy">
                        </div>
                        <div class="tx-card-body">
                            <h3>${escHtml(t.name)}</h3>
                            <div class="loc">${escHtml(loc)}</div>
                            <p>${escHtml(townBlurb(t))}</p>
                            <span class="tx-card-cta">Visit town page <span aria-hidden="true">→</span></span>
                        </div>
                    </a>`;
            }).join('');
        }

        function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        document.addEventListener('DOMContentLoaded', loadTowns);
    </script>
</body>
</html>
