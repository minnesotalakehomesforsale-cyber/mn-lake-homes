<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Sign-in | Minnesota Lake Homes</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="../../components/components.js" defer></script>

    <style>
        :root {
            --brand: #d97706;
            --brand-dark: #b45309;
            --ink: #1a202c;
            --ink-soft: #4a5568;
            --muted: #718096;
            --line: #e5eaf0;
            --surface: #f7f9fa;
        }
        body { background: var(--surface); font-family: 'Inter', sans-serif; color: var(--ink); }

        /* Centered card, same visual language as /business-signup. */
        .bl-shell {
            min-height: calc(100vh - 76px);
            padding: 11rem 1.5rem 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bl-inner { width: 100%; max-width: 440px; }

        .bl-eyebrow {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.72rem; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
            color: var(--brand);
            background: #fffbeb; border: 1px solid #fde68a;
            padding: 0.35rem 0.75rem; border-radius: 999px;
            margin-bottom: 1rem;
        }
        .bl-eyebrow::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--brand);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 20%, transparent);
        }
        .bl-shell > .bl-inner > .bl-eyebrow { display: inline-flex; }

        h1 {
            font-size: clamp(1.9rem, 3.5vw, 2.5rem);
            font-weight: 900; letter-spacing: -0.9px; line-height: 1.1;
            margin: 0 0 0.5rem;
        }
        h1 em {
            font-style: normal;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .sub { color: var(--ink-soft); margin: 0 0 2rem; font-size: 1rem; line-height: 1.55; }

        .bl-card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow:
                0 28px 50px -24px rgba(16,24,40,0.18),
                0 2px 0 rgba(255,255,255,0.7) inset;
            padding: 2rem 2rem 1.75rem;
        }

        .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.05rem; }
        .field label {
            font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1px;
        }
        .field input {
            font-family: inherit; font-size: 0.96rem;
            padding: 0.8rem 0.95rem;
            border: 1px solid var(--line); border-radius: 12px;
            background: #fff; color: var(--ink); outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input::placeholder { color: #a0aec0; }
        .field input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 14%, transparent);
        }

        .submit {
            width: 100%; background: var(--brand); color: #fff; border: 0;
            font-family: inherit; font-size: 0.98rem; font-weight: 800; letter-spacing: 0.1px;
            padding: 1rem; border-radius: 12px; cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 14px 30px -8px color-mix(in srgb, var(--brand) 65%, transparent);
        }
        .submit:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: 0 18px 36px -8px color-mix(in srgb, var(--brand) 70%, transparent); }
        .submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .err { display: none; padding: 0.75rem 1rem; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; border-radius: 10px; font-size: 0.88rem; margin-bottom: 1rem; }
        .err.show { display: block; }

        .foot {
            text-align: center; margin-top: 1.25rem; padding-top: 1rem;
            border-top: 1px solid var(--line);
            color: var(--muted); font-size: 0.86rem;
        }
        .foot a { color: var(--brand); font-weight: 800; text-decoration: none; }
        .foot a:hover { text-decoration: underline; }

        @media (max-width: 520px) {
            .bl-shell { padding: 8rem 1rem 3rem; }
            .bl-card { padding: 1.5rem 1.35rem 1.35rem; }
        }
    </style>
</head>
<body>
    <global-header></global-header>

    <main class="bl-shell">
        <div class="bl-inner">
            <span class="bl-eyebrow">Business sign-in</span>
            <h1>Welcome <em>back</em>.</h1>
            <p class="sub">Sign in to manage your listing, subscription, and profile.</p>

            <div class="bl-card">
                <div class="err" id="err"></div>
                <form id="form" onsubmit="submitLogin(event)" novalidate>
                    <div class="field">
                        <label>Email</label>
                        <input id="f-email" type="email" required placeholder="you@yourbusiness.com" autocomplete="email">
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input id="f-password" type="password" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <button class="submit" id="submit-btn" type="submit">Sign in →</button>
                </form>
                <div class="foot">New here? <a href="/business-signup">Create a business account</a></div>
            </div>
        </div>
    </main>

    <script>
        async function submitLogin(e) {
            e.preventDefault();
            const err = document.getElementById('err');
            err.classList.remove('show');
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Signing in…';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: document.getElementById('f-email').value.trim(),
                        password: document.getElementById('f-password').value,
                    }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                // Role-based redirect — catches agents or admins who land
                // on this page by accident and routes them home.
                if (data.role === 'business_owner') window.location.href = '/business/dashboard';
                else if (data.role === 'agent')     window.location.href = '/pages/agent/dashboard.html';
                else if (data.role === 'admin' || data.role === 'super_admin') window.location.href = '/pages/admin/dashboard.html';
                else window.location.href = '/';
            } catch (ex) {
                err.textContent = ex.message || 'Invalid email or password.';
                err.classList.add('show');
                btn.disabled = false; btn.textContent = 'Sign in →';
            }
        }
    </script>
</body>
</html>
