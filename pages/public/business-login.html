<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Sign-in | Minnesota Lake Homes</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../../components/components.js" defer></script>

    <style>
        :root { --brand: #d97706; --brand-dark: #b45309; --ink: #1a202c; --muted: #718096; --line: #e5eaf0; }
        body { background: #f7f9fa; font-family: 'Inter', sans-serif; color: var(--ink); }
        .bl-shell { max-width: 440px; margin: 0 auto; padding: 4rem 1.25rem 5rem; }
        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.4px; margin: 0 0 0.4rem; text-align: center; }
        .sub { color: var(--muted); text-align: center; margin: 0 0 2rem; font-size: 0.95rem; }
        .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 2rem; box-shadow: 0 10px 30px rgba(16,24,40,0.04); }
        .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
        .field label { font-size: 0.78rem; font-weight: 700; }
        .field input {
            font-family: inherit; font-size: 0.96rem;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--line); border-radius: 10px;
            background: #fff; outline: none;
        }
        .field input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(217,119,6,0.12); }
        .submit {
            width: 100%;
            background: var(--brand); color: #fff; border: 0;
            font-family: inherit; font-size: 0.95rem; font-weight: 800;
            padding: 0.9rem; border-radius: 10px; cursor: pointer;
            box-shadow: 0 8px 18px rgba(217,119,6,0.25);
            transition: background 0.12s;
        }
        .submit:hover { background: var(--brand-dark); }
        .err { display: none; padding: 0.7rem 1rem; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; border-radius: 10px; font-size: 0.9rem; margin-bottom: 1rem; }
        .err.show { display: block; }
        .foot { text-align: center; margin-top: 1.25rem; color: var(--muted); font-size: 0.88rem; }
        .foot a { color: var(--brand); font-weight: 700; }
    </style>
</head>
<body>
    <global-header></global-header>
    <main class="bl-shell">
        <h1>Business sign-in</h1>
        <p class="sub">Manage your listing, subscription, and profile.</p>
        <div class="card">
            <div class="err" id="err"></div>
            <form id="form" onsubmit="submitLogin(event)">
                <div class="field">
                    <label>Email</label>
                    <input id="f-email" type="email" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input id="f-password" type="password" required>
                </div>
                <button class="submit" id="submit-btn" type="submit">Sign in</button>
            </form>
            <div class="foot">New here? <a href="/business-signup">Create a business account</a></div>
        </div>
    </main>

    <script>
        async function submitLogin(e) {
            e.preventDefault();
            const err = document.getElementById('err');
            err.classList.remove('show');
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Signing in…';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: document.getElementById('f-email').value.trim(),
                        password: document.getElementById('f-password').value,
                    }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                // Role-based redirect — catches agents or admins who land
                // on this page by accident and routes them home.
                if (data.role === 'business_owner') window.location.href = '/business/dashboard';
                else if (data.role === 'agent')     window.location.href = '/pages/agent/dashboard.html';
                else if (data.role === 'admin' || data.role === 'super_admin') window.location.href = '/pages/admin/dashboard.html';
                else window.location.href = '/';
            } catch (ex) {
                err.textContent = ex.message || 'Invalid email or password.';
                err.classList.add('show');
                btn.disabled = false; btn.textContent = 'Sign in';
            }
        }
    </script>
</body>
</html>
