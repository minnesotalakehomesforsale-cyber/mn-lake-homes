<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lake Properties Map | MN Lake Homes</title>
    <meta name="description" content="Browse Minnesota lake homes for sale on an interactive map — pinned to their location, straight to the agent's full listing.">
    <link rel="canonical" href="https://minnesotalakehomesforsale.com/properties">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJ2yZQcIvj2Wr5V9v0/CO7X4gYtRQ=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="../../components/components.js" defer></script>
    <script src="../../components/card-carousel.js"></script>
    <style>
        html, body { margin: 0; padding: 0; background: #f7f9fa; }
        .pm-head { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 1rem; }
        .pm-head h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 800; letter-spacing: -1px; margin: 0 0 0.4rem; color: #1a202c; }
        .pm-head p { color: #4a5568; font-size: 1.02rem; margin: 0 0 0.9rem; max-width: 640px; line-height: 1.55; }
        .pm-switch { display: inline-flex; background: #edf2f7; border-radius: 999px; padding: 0.3rem; gap: 0.25rem; }
        .pm-switch a { text-decoration: none; font-size: 0.85rem; font-weight: 700; color: #4a5568; padding: 0.45rem 1rem; border-radius: 999px; }
        .pm-switch a.on { background: #fff; color: #1d6df2; box-shadow: 0 2px 6px rgba(16,24,40,0.08); }
        .pm-map-wrap { max-width: 1100px; margin: 1rem auto 3rem; padding: 0 1.5rem; }
        .pm-filters { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.85rem; align-items:center; }
        .pm-filters input[type=text], .pm-filters select { font:inherit; font-size:0.88rem; padding:0.5rem 0.7rem; border:1px solid #e2e8f0; border-radius:9px; background:#fff; outline:none; }
        .pm-filters input[type=text] { flex:1; min-width:150px; }
        .pm-filters input:focus, .pm-filters select:focus { border-color:#1d6df2; }
        .pm-wf { display:inline-flex; align-items:center; gap:0.35rem; font-size:0.88rem; color:#4a5568; font-weight:600; cursor:pointer; }
        #f-clear { border:1px solid #e2e8f0; background:#fff; border-radius:9px; padding:0.5rem 0.85rem; font:inherit; font-size:0.85rem; font-weight:700; color:#718096; cursor:pointer; }
        .pm-split { display: flex; gap: 1rem; align-items: stretch; }
        #props-map { flex: 1 1 56%; height: 660px; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; z-index: 0; }
        .pm-list-wrap { flex: 1 1 44%; max-height: 660px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 16px; padding: 0.75rem; -webkit-overflow-scrolling: touch; }
        #props-list { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
        .pl-card { display: block; text-decoration: none; color: inherit; border: 1px solid #edf2f7; border-radius: 12px; overflow: hidden; background: #fff; transition: box-shadow .15s, border-color .15s; }
        .pl-card:hover, .pl-card.hi { box-shadow: 0 6px 18px rgba(29,109,242,0.16); border-color: #bcd4fb; }
        .pl-img { height: 160px; position: relative; }
        .pl-b { padding: 0.7rem 0.95rem 0.85rem; }
        .pl-price { font-weight: 800; color: #0f2b46; font-size: 1.2rem; letter-spacing: -0.5px; }
        .pl-specs { color: #4a5568; font-size: 0.88rem; margin-top: 0.15rem; }
        .pl-addr { color: #a0aec0; font-size: 0.82rem; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pl-flags { margin-top: 0.4rem; display: flex; gap: 0.35rem; flex-wrap: wrap; }
        .pm-pin.pm-pin-hi span, .pm-pin-hi span { transform: scale(1.5); box-shadow: 0 0 0 4px rgba(29,109,242,0.35), 0 2px 6px rgba(16,24,40,0.5) !important; }
        .pm-toggle { display: none; }
        @media (max-width: 900px) {
            .pm-split { flex-direction: column; }
            #props-map { flex: none; height: 62vh; }
            .pm-list-wrap { flex: none; max-height: none; border: none; padding: 0; overflow: visible; }
            #props-list { grid-template-columns: 1fr 1fr; }
            /* Map/List toggle on small screens */
            .pm-toggle { display: inline-flex; background: #edf2f7; border-radius: 999px; padding: 0.25rem; margin: 0 0 0.75rem; }
            .pm-toggle button { border: none; background: none; font: inherit; font-weight: 700; font-size: 0.85rem; color: #4a5568; padding: 0.45rem 1.1rem; border-radius: 999px; cursor: pointer; }
            .pm-toggle button.on { background: #fff; color: #1d6df2; box-shadow: 0 2px 6px rgba(16,24,40,0.08); }
            .pm-split.show-list #props-map { display: none; }
            .pm-split.show-map .pm-list-wrap { display: none; }
        }
        @media (max-width: 560px) { #props-list { grid-template-columns: 1fr; } }
        .pm-count { font-size: 0.85rem; color: #718096; margin: 0.75rem 0 0; }
        .leaflet-popup-content-wrapper { border-radius: 14px !important; box-shadow: 0 14px 34px rgba(16,24,40,0.22) !important; padding: 0 !important; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 240px !important; font-family: 'SF Pro Text', -apple-system, sans-serif; }
        .pm-pop-img { height: 120px; background: #eef2f7 center/cover; display: block; }
        .pm-pop-carousel { height: 130px; position: relative; }
        .pm-pop-body { padding: 0.7rem 0.85rem 0.85rem; }
        .pm-pop-body .t { font-weight: 800; font-size: 0.95rem; color: #1a202c; line-height: 1.25; }
        .pm-pop-body .m { font-size: 0.8rem; color: #718096; margin-top: 0.15rem; }
        .pm-pop-body a.view { display: inline-block; margin-top: 0.6rem; background: #1d6df2; color: #fff; font-weight: 700; font-size: 0.82rem; text-decoration: none; border-radius: 8px; padding: 0.4rem 0.8rem; }
        .pm-empty { text-align: center; color: #a0aec0; padding: 3rem 1rem; }
        .pm-pin span { display:block; width:100%; height:100%; border-radius:50%; border:2px solid #fff; box-shadow:0 1px 4px rgba(16,24,40,0.4); background:#1d6df2; }
        .pm-pin-feat span { background:#f6ad14; box-shadow:0 0 0 3px rgba(246,173,20,0.35), 0 2px 6px rgba(16,24,40,0.45); }
        .pm-pop-feat { display:inline-block; background:#fef3c7; color:#b45309; font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; border-radius:5px; padding:2px 6px; margin-bottom:0.35rem; }
        .pm-pop-chip { display:inline-block; font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; border-radius:5px; padding:2px 6px; margin-bottom:0.35rem; }
        .pm-pop-chip.new { background:#e6fffa; color:#0f766e; }
        .pm-pop-chip.drop { background:#fee2e2; color:#b91c1c; }
        .pm-pop-chip.oh { background:#fef3c7; color:#b45309; }
        .pm-legend { display:flex; gap:1.1rem; flex-wrap:wrap; align-items:center; font-size:0.8rem; color:#718096; margin:0.75rem 0 0; }
        .pm-legend i { width:12px; height:12px; border-radius:50%; display:inline-block; vertical-align:-1px; margin-right:0.3rem; border:2px solid #fff; box-shadow:0 0 0 1px #e2e8f0; }
        .pm-sold { margin-top:2.5rem; }
        .pm-sold h2 { font-size:1.5rem; font-weight:800; color:#1a202c; letter-spacing:-0.5px; margin:0 0 0.2rem; }
        .pm-sold-sub { color:#718096; margin:0 0 1.1rem; font-size:0.95rem; }
        .pm-sold-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }
        .pm-sold-card { position:relative; border:1px solid #edf2f7; border-radius:12px; overflow:hidden; background:#fff; }
        .pm-sold-card .img { width:100%; aspect-ratio:4/3; object-fit:cover; background:#eef2f7; display:block; filter:grayscale(0.15); }
        .pm-sold-card .ribbon { position:absolute; top:12px; left:-30px; transform:rotate(-45deg); background:#1a202c; color:#fff; font-size:0.68rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:3px 34px; }
        .pm-sold-card .b { padding:0.7rem 0.85rem 0.9rem; }
        .pm-sold-card .t { font-weight:700; color:#2d3748; font-size:0.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .pm-sold-card .m { color:#a0aec0; font-size:0.82rem; margin-top:0.2rem; }
        @media (max-width:600px){ .pm-sold-grid { grid-template-columns:1fr 1fr; gap:0.6rem; } }
        @media (max-width: 600px) { .pm-head { padding: 1.5rem 1rem 0.75rem; } .pm-map-wrap { padding: 0 1rem; } }
    </style>
</head>
<body>
    <global-header></global-header>

    <div class="pm-head">
        <h1>Lake Properties</h1>
        <p>Homes for sale on Minnesota's lakes, pinned to the map. Click a pin to jump to the agent's full listing.</p>
        <div class="pm-switch">
            <a href="/properties" class="on">Properties</a>
            <a href="/towns">Lakes &amp; Towns</a>
            <a href="/towns#businesses">Businesses</a>
        </div>
        <a href="/pages/user/dashboard.html#alerts" style="display:inline-block;margin-top:0.9rem;background:#eef4ff;color:#1d6df2;font-weight:700;font-size:0.85rem;text-decoration:none;border-radius:999px;padding:0.5rem 1.1rem;">🔔 Get price alerts for new lake homes</a>
    </div>
    <div class="pm-map-wrap">
        <div class="pm-filters" id="pm-filters">
            <input id="f-q" type="text" placeholder="Keyword / lake / city">
            <select id="f-type">
                <option value="">Any type</option><option>Single Family</option><option>Condo</option>
                <option>Townhouse</option><option>Cabin / Cottage</option><option>Land / Lot</option>
                <option>Farm / Acreage</option><option>Multi-Family</option><option>Manufactured</option>
            </select>
            <select id="f-beds"><option value="">Any beds</option><option value="1">1+ bd</option><option value="2">2+ bd</option><option value="3">3+ bd</option><option value="4">4+ bd</option><option value="5">5+ bd</option></select>
            <select id="f-price"><option value="">Any price</option><option value="300000">Under $300k</option><option value="500000">Under $500k</option><option value="750000">Under $750k</option><option value="1000000">Under $1M</option><option value="2000000">Under $2M</option></select>
            <label class="pm-wf"><input id="f-wf" type="checkbox"> Waterfront</label>
            <button id="f-clear" type="button" onclick="clearFilters()">Clear</button>
        </div>
        <p class="pm-count" id="pm-count"></p>
        <div class="pm-toggle" id="pm-toggle">
            <button type="button" class="on" data-view="map" onclick="pmView('map')">🗺 Map</button>
            <button type="button" data-view="list" onclick="pmView('list')">☰ List</button>
        </div>
        <div class="pm-split show-map" id="pm-split">
            <div id="props-map"></div>
            <div class="pm-list-wrap"><div id="props-list"></div></div>
        </div>

        <section class="pm-sold" id="pm-sold" style="display:none;">
            <h2>Recently sold</h2>
            <p class="pm-sold-sub">Homes our agents recently closed on Minnesota's lakes.</p>
            <div class="pm-sold-grid" id="pm-sold-grid"></div>
        </section>
    </div>

    <global-footer></global-footer>

    <script>
        (function () {
            const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const money = n => n ? '$' + Number(n).toLocaleString('en-US') : 'Contact for price';
            const thumb = u => (typeof u === 'string' && u.includes('/upload/')) ? u.replace('/upload/', '/upload/w_320,h_180,c_fill,q_auto,f_auto/') : u;

            const map = L.map('props-map', { scrollWheelZoom: true }).setView([46.7, -94.6], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19, subdomains: 'abcd', attribution: ''
            }).addTo(map);

            const featIcon = L.divIcon({ className: 'pm-pin pm-pin-feat', html: '<span></span>', iconSize: [22, 22], iconAnchor: [11, 11] });
            const regIcon  = L.divIcon({ className: 'pm-pin',              html: '<span></span>', iconSize: [16, 16], iconAnchor: [8, 8] });
            const count = document.getElementById('pm-count');
            // Standard homes cluster; featured stay as individual pins so paid
            // placement is always visible.
            const cluster  = L.markerClusterGroup ? L.markerClusterGroup({ maxClusterRadius: 48, showCoverageOnHover: false }) : L.layerGroup();
            const featLayer = L.layerGroup().addTo(map);
            map.addLayer(cluster);
            let _all = [];

            function popupHtml(p) {
                let pgal = p.gallery; if (typeof pgal === 'string') { try { pgal = JSON.parse(pgal); } catch (_) { pgal = []; } }
                const pimgs = [p.featured_image_url, ...(Array.isArray(pgal) ? pgal : [])].filter(Boolean);
                const img = pimgs.length ? `<div class="pm-pop-carousel">${window.cardCarouselHTML ? cardCarouselHTML(pimgs, { alt: p.title, width: 320 }) : `<span class="pm-pop-img" style="background-image:url('${esc(thumb(p.featured_image_url))}')"></span>`}</div>` : '';
                const now = Date.now();
                const created = p.created_at ? new Date(p.created_at).getTime() : null;
                const isNew = created && (now - created) <= 14 * 86400000;
                const dropped = p.original_price != null && p.price != null && Number(p.price) < Number(p.original_price);
                const oh = p.open_house_at && new Date(p.open_house_at).getTime() > now;
                const chips = [
                    p.featured ? '<span class="pm-pop-feat">★ Featured</span>' : '',
                    isNew ? '<span class="pm-pop-chip new">New</span>' : '',
                    dropped ? '<span class="pm-pop-chip drop">Price ↓</span>' : '',
                    oh ? '<span class="pm-pop-chip oh">Open house</span>' : '',
                ].filter(Boolean).join(' ');
                const badge = chips ? chips + '<br>' : '';
                const meta = [money(p.price), esc(p.city || ''), p.agent_name ? esc(p.agent_name) : ''].filter(Boolean).join(' · ');
                return `${img}<div class="pm-pop-body">${badge}<div class="t">${esc(p.title)}</div><div class="m">${meta}</div><a class="view" href="/listings/${esc(p.slug)}">View listing →</a></div>`;
            }

            const _markers = {};
            const listEl = document.getElementById('props-list');

            function cardHtml(p) {
                let g = p.gallery; if (typeof g === 'string') { try { g = JSON.parse(g); } catch (_) { g = []; } }
                const imgs = [p.featured_image_url, ...(Array.isArray(g) ? g : [])].filter(Boolean);
                const cine = window.cardCarouselHTML ? cardCarouselHTML(imgs, { alt: p.title, width: 520 })
                    : `<span style="display:block;width:100%;height:100%;background:#eef2f7 ${p.featured_image_url ? `url('${esc(thumb(p.featured_image_url))}') center/cover` : ''}"></span>`;
                const specs = [p.beds != null ? p.beds + ' bd' : '', p.baths != null ? p.baths + ' ba' : '', p.property_type || ''].filter(Boolean).join(' · ');
                const now = Date.now();
                const flags = [
                    p.featured ? '<span class="pm-pop-feat">★ Featured</span>' : '',
                    (p.created_at && now - new Date(p.created_at).getTime() <= 14 * 86400000) ? '<span class="pm-pop-chip new">New</span>' : '',
                    (p.original_price != null && p.price != null && Number(p.price) < Number(p.original_price)) ? '<span class="pm-pop-chip drop">Price ↓</span>' : '',
                ].filter(Boolean).join(' ');
                return `<a class="pl-card" data-id="${esc(p.id)}" href="/listings/${esc(p.slug)}">
                    <div class="pl-img">${cine}</div>
                    <div class="pl-b"><div class="pl-price">${money(p.price)}</div>
                    <div class="pl-specs">${esc(specs || 'Lake home')}</div>
                    <div class="pl-addr">${esc([p.city, p.agent_name].filter(Boolean).join(' · ') || p.title)}</div>
                    ${flags ? `<div class="pl-flags">${flags}</div>` : ''}</div></a>`;
            }

            function applyFilters() {
                cluster.clearLayers(); featLayer.clearLayers();
                for (const k in _markers) delete _markers[k];
                const q = (document.getElementById('f-q').value || '').toLowerCase().trim();
                const type = document.getElementById('f-type').value;
                const minBeds = +document.getElementById('f-beds').value || 0;
                const maxPrice = +document.getElementById('f-price').value || 0;
                const wf = document.getElementById('f-wf').checked;
                const bounds = []; const matched = []; let anyFeat = false;
                _all.forEach(p => {
                    const lat = Number(p.latitude), lng = Number(p.longitude);
                    if (!isFinite(lat) || !isFinite(lng)) return;
                    if (q) { const hay = [p.title, p.city, p.agent_name].filter(Boolean).join(' ').toLowerCase(); if (!hay.includes(q)) return; }
                    if (type && p.property_type !== type) return;
                    if (minBeds && !(p.beds >= minBeds)) return;
                    if (maxPrice && !(p.price != null && p.price <= maxPrice)) return;
                    if (wf && p.waterfront !== true) return;
                    const m = L.marker([lat, lng], { icon: p.featured ? featIcon : regIcon, zIndexOffset: p.featured ? 1000 : 0 }).bindPopup(popupHtml(p));
                    if (p.featured) { featLayer.addLayer(m); anyFeat = true; } else { cluster.addLayer(m); }
                    _markers[p.id] = m;
                    bounds.push([lat, lng]); matched.push(p);
                });
                if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
                const shown = matched.length;
                count.innerHTML = shown
                    ? `${shown} propert${shown === 1 ? 'y' : 'ies'}${shown !== _all.length ? ' of ' + _all.length : ''}.`
                        + (anyFeat ? `<span class="pm-legend"><span><i style="background:#f6ad14"></i>Featured agent</span><span><i style="background:#1d6df2"></i>Standard</span></span>` : '')
                    : 'No properties match these filters — try widening them.';
                // List panel (synced with the map).
                listEl.innerHTML = shown ? matched.map(cardHtml).join('') : '<div style="padding:2rem 1rem;text-align:center;color:#a0aec0;">No matches — widen your filters.</div>';
                listEl.querySelectorAll('.pl-card').forEach(cardEl => {
                    const mk = _markers[cardEl.dataset.id];
                    cardEl.addEventListener('mouseenter', () => { if (mk && mk._icon) mk._icon.classList.add('pm-pin-hi'); });
                    cardEl.addEventListener('mouseleave', () => { if (mk && mk._icon) mk._icon.classList.remove('pm-pin-hi'); });
                });
            }
            // Mobile Map/List toggle.
            window.pmView = function (v) {
                const split = document.getElementById('pm-split');
                split.classList.toggle('show-map', v === 'map');
                split.classList.toggle('show-list', v === 'list');
                document.querySelectorAll('#pm-toggle button').forEach(b => b.classList.toggle('on', b.dataset.view === v));
                if (v === 'map') setTimeout(() => map.invalidateSize(), 50);
            };
            window.clearFilters = function () {
                ['f-q', 'f-type', 'f-beds', 'f-price'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('f-wf').checked = false;
                applyFilters();
            };
            ['f-q'].forEach(id => document.getElementById(id).addEventListener('input', applyFilters));
            ['f-type', 'f-beds', 'f-price', 'f-wf'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters));

            fetch('/api/listings/map').then(r => r.ok ? r.json() : []).then(rows => {
                if (!Array.isArray(rows) || !rows.length) {
                    count.textContent = 'No properties on the map yet — agents add them from their dashboard.';
                    document.getElementById('pm-filters').style.display = 'none';
                    return;
                }
                _all = rows;
                applyFilters();
                setTimeout(() => map.invalidateSize(), 120);
            }).catch(() => {
                count.textContent = 'Could not load properties. Please refresh.';
            });

            // Recently sold wall (social proof).
            fetch('/api/listings/sold').then(r => r.ok ? r.json() : []).then(rows => {
                if (!Array.isArray(rows) || !rows.length) return;
                const fmt = d => { try { return new Date(d).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }); } catch (_) { return ''; } };
                document.getElementById('pm-sold-grid').innerHTML = rows.map(s => {
                    let sgal = s.gallery; if (typeof sgal === 'string') { try { sgal = JSON.parse(sgal); } catch (_) { sgal = []; } }
                    const simgs = [s.featured_image_url, ...(Array.isArray(sgal) ? sgal : [])].filter(Boolean);
                    return `
                    <div class="pm-sold-card">
                        <div class="ribbon" style="z-index:3;">Sold</div>
                        <div class="img">${window.cardCarouselHTML ? cardCarouselHTML(simgs, { alt: s.title, width: 480 }) : `<span style="display:block;width:100%;height:100%;background:#eef2f7 ${s.featured_image_url ? `url('${esc(thumb(s.featured_image_url))}') center/cover` : ''}"></span>`}</div>
                        <div class="b">
                            <div class="t">${esc(s.title)}</div>
                            <div class="m">${[esc(s.city || ''), s.sold_at ? 'Sold ' + fmt(s.sold_at) : ''].filter(Boolean).join(' · ')}</div>
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('pm-sold').style.display = 'block';
            }).catch(() => {});
        })();
    </script>
</body>
</html>
