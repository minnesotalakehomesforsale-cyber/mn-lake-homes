<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Agent Profile | MN Lake Homes</title>
    <meta name="description" content="MN Lake Homes agent profile page.">
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../../components/components.js" defer></script>
</head>
<body style="background-color: #fff;">

    <global-header></global-header>

    <!-- Back-to-agents link (sits on top of hero background) -->
    <div class="agent-back-wrap">
        <a href="agents.html" class="agent-back-link" aria-label="Back to all agents">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            All agents
        </a>
    </div>

    <!-- Dark centered hero — exact same as blog.html -->
    <div style="padding: 12rem 2rem 5rem; text-align: center; background-color: var(--bg-dark); color: #fff;" id="profile-hero">
        <div style="color: #a0aec0; font-size: 1.1rem;">Loading profile...</div>
    </div>

    <style>
        .agent-back-wrap {
            position: absolute;
            top: 6.5rem;
            left: 2rem;
            z-index: 10;
        }
        .agent-back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 0.9rem;
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            transition: color 0.2s, background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .agent-back-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.25);
            transform: translateX(-2px);
        }
        @media (max-width: 600px) {
            .agent-back-wrap { top: 5.5rem; left: 1rem; }
            .agent-back-link { font-size: 0.82rem; padding: 0.4rem 0.75rem; }
        }

        /* Mobile optimization for agent profile page */
        @media (max-width: 768px) {
            #profile-hero {
                padding: 7rem 1.25rem 3rem !important;
            }
            #profile-hero img {
                width: 96px !important;
                height: 96px !important;
                margin-bottom: 1.25rem !important;
            }
            #profile-hero > div[style*="border-radius:50%"] {
                width: 96px !important;
                height: 96px !important;
                line-height: 96px !important;
                font-size: 2.25rem !important;
                margin-bottom: 1.25rem !important;
            }
            #profile-hero h1 {
                font-size: 2rem !important;
                letter-spacing: -0.75px !important;
                line-height: 1.15 !important;
                margin-bottom: 0.5rem !important;
            }
            #profile-hero p {
                font-size: 0.95rem !important;
                margin-bottom: 1rem !important;
                padding: 0 0.5rem;
                line-height: 1.4;
            }
            #profile-hero span {
                font-size: 0.72rem !important;
                padding: 0.35rem 0.85rem !important;
            }

            #profile-section {
                padding: 2.5rem 0 4rem !important;
            }
            #profile-body {
                grid-template-columns: 1fr !important;
                gap: 1.25rem !important;
                padding: 0 1rem !important;
            }
            #profile-body > div {
                padding: 1.75rem 1.25rem !important;
                position: static !important;
                top: auto !important;
            }
            #profile-body h2 {
                font-size: 0.95rem !important;
            }
            #profile-body p {
                font-size: 0.98rem !important;
            }
            #profile-body input,
            #profile-body textarea {
                font-size: 16px !important; /* Prevent iOS zoom on focus */
            }
        }

        @media (max-width: 420px) {
            #profile-hero { padding: 6.5rem 1rem 2.5rem !important; }
            #profile-hero h1 { font-size: 1.75rem !important; }
        }
    </style>

    <!-- Main content — white bg, matches rest of site -->
    <section id="profile-section" style="background-color: #f7f9fa; padding: 4rem 0 8rem;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 380px; gap: 3rem; align-items: start;" id="profile-body">
            <!-- JS injects main + sidebar -->
        </div>
    </section>

    <global-footer></global-footer>
    <lead-modal></lead-modal>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const slug = new URLSearchParams(window.location.search).get('slug');
            const hero = document.getElementById('profile-hero');
            const body = document.getElementById('profile-body');

            let agent = null;
            try {
                if (slug) {
                    const res = await fetch(`/api/agents/public/${slug}`);
                    if (res.ok) agent = await res.json();
                }
            } catch (err) {
                console.error(err);
            }

            if (!agent) {
                hero.innerHTML = `
                    <h1 style="font-size:3rem; font-weight:700; letter-spacing:-1px; margin-bottom:1rem;">Agent Not Found</h1>
                    <p style="color:#a0aec0;">This profile is inactive or unavailable.</p>
                `;
                body.innerHTML = '';
                return;
            }

            // Update page title
            document.getElementById('page-title').textContent = `${agent.display_name} | MN Lake Homes`;

            const serviceAreas = Array.isArray(agent.service_areas) ? agent.service_areas : (JSON.parse(agent.service_areas || '[]'));
            const specialties = Array.isArray(agent.specialties) ? agent.specialties : (JSON.parse(agent.specialties || '[]'));

            // Hero — matches blog.html dark centered style
            const initials = agent.display_name.split(' ').map(n => n[0]).join('');
            const initialsAvatar = `<div style="display:inline-block; background: var(--accent-blue); color:#fff; width:120px; height:120px; border-radius:50%; line-height:120px; font-size:2.75rem; font-weight:800; margin-bottom:2rem;">${initials}</div>`;
            const avatarHtml = agent.profile_photo_url
                ? `<img id="agent-avatar-img" src="${agent.profile_photo_url}" alt="${agent.display_name}" style="display:inline-block; width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:2rem; border:3px solid rgba(255,255,255,0.1); box-shadow:0 15px 40px rgba(0,0,0,0.3);">`
                : initialsAvatar;
            const topAgentPill = agent.is_featured
                ? `<span title="Top Agent — featured on MN Lake Homes" style="display:inline-flex; align-items:center; gap:0.4rem; background:linear-gradient(135deg,#1d6df2 0%,#155bc8 100%); color:#fff; padding:0.4rem 1rem; border-radius:99px; font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; box-shadow:0 4px 14px rgba(29,109,242,0.4); margin-left:0.5rem; vertical-align:middle;">
                       <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                       Top Agent
                   </span>`
                : '';

            const badgeLabel = agent.membership_badge || 'Agent';
            const showPlainBadge = !(agent.is_featured && badgeLabel.trim().toLowerCase() === 'top agent');
            const plainBadge = showPlainBadge
                ? `<span style="display:inline-block; background:var(--accent-blue); color:#fff; padding:0.4rem 1.2rem; border-radius:99px; font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:1px;">${badgeLabel}</span>`
                : '';

            hero.innerHTML = `
                ${avatarHtml}
                <h1 style="font-size:3.5rem; font-weight:700; letter-spacing:-2px; margin-bottom:0.75rem;">${agent.display_name}</h1>
                <p style="font-size:1.25rem; color:#a0aec0; margin-bottom:1.5rem;">${agent.brokerage_name || 'Independent Realtor'} &nbsp;·&nbsp; ${agent.city || 'Minnesota'}</p>
                <div style="display:inline-flex; align-items:center; flex-wrap:wrap; justify-content:center; gap:0.25rem;">
                    ${plainBadge}
                    ${topAgentPill}
                </div>
            `;

            const avatarImg = document.getElementById('agent-avatar-img');
            if (avatarImg) {
                avatarImg.addEventListener('error', () => {
                    avatarImg.outerHTML = initialsAvatar;
                });
            }

            // Specialties & areas pills
            const specPills = specialties.map(s =>
                `<span style="display:inline-block; background:#edf2f7; color:#4a5568; padding:0.4rem 0.9rem; border-radius:99px; font-size:0.85rem; font-weight:600; margin:0.25rem;">${s}</span>`
            ).join('');

            const areaPills = serviceAreas.map(a =>
                `<span style="display:inline-block; background:#ebf8ff; color:#2b6cb0; padding:0.4rem 0.9rem; border-radius:99px; font-size:0.85rem; font-weight:600; margin:0.25rem;">${a}</span>`
            ).join('');

            // Main content block — white card, matches site card style
            body.innerHTML = `
                <div style="background:#fff; border-radius:12px; border:1px solid #edf2f7; box-shadow:0 4px 6px rgba(0,0,0,0.02); padding:3rem;">
                    <h2 style="font-size:1.1rem; font-weight:800; color:#1a202c; text-transform:uppercase; letter-spacing:1px; margin-bottom:1.5rem; padding-bottom:0.75rem; border-bottom:2px solid #edf2f7;">About</h2>
                    <p style="font-size:1.05rem; line-height:1.8; color:#4a5568; margin-bottom:3rem;">${agent.bio || 'Professional biography coming soon.'}</p>

                    ${areaPills ? `
                        <h2 style="font-size:1.1rem; font-weight:800; color:#1a202c; text-transform:uppercase; letter-spacing:1px; margin-bottom:1rem; padding-bottom:0.75rem; border-bottom:2px solid #edf2f7;">Service Areas</h2>
                        <div style="margin-bottom:2.5rem;">${areaPills}</div>
                    ` : ''}

                    ${specPills ? `
                        <h2 style="font-size:1.1rem; font-weight:800; color:#1a202c; text-transform:uppercase; letter-spacing:1px; margin-bottom:1rem; padding-bottom:0.75rem; border-bottom:2px solid #edf2f7;">Specialties</h2>
                        <div>${specPills}</div>
                    ` : ''}
                </div>

                <!-- Inquiry form sidebar -->
                <div style="background:#fff; border-radius:12px; border:1px solid #edf2f7; box-shadow:0 4px 6px rgba(0,0,0,0.02); padding:2.5rem; position:sticky; top:100px;">
                    <h2 style="font-size:1.5rem; font-weight:800; color:#1a202c; margin-bottom:0.5rem;">Contact ${agent.display_name.split(' ')[0]}</h2>
                    <p style="color:#718096; font-size:0.95rem; line-height:1.5; margin-bottom:2rem;">Reach out directly about your property goals.</p>

                    <form id="agent-lead-form">
                        <input type="hidden" id="form-agent-id" value="${agent.id}">

                        <div class="form-group-sys" style="margin-bottom:1.25rem;">
                            <label style="display:block; font-weight:700; color:#4a5568; margin-bottom:0.4rem; font-size:0.8rem; text-transform:uppercase;">Full Name</label>
                            <input type="text" id="lead-name" class="input-sys" placeholder="Jane Doe" required>
                        </div>
                        <div class="form-group-sys" style="margin-bottom:1.25rem;">
                            <label style="display:block; font-weight:700; color:#4a5568; margin-bottom:0.4rem; font-size:0.8rem; text-transform:uppercase;">Phone</label>
                            <input type="tel" id="lead-phone" class="input-sys" placeholder="(612) 555-0199" required>
                        </div>
                        <div class="form-group-sys" style="margin-bottom:1.25rem;">
                            <label style="display:block; font-weight:700; color:#4a5568; margin-bottom:0.4rem; font-size:0.8rem; text-transform:uppercase;">Email</label>
                            <input type="email" id="lead-email" class="input-sys" placeholder="jane@example.com" required>
                        </div>
                        <div class="form-group-sys" style="margin-bottom:2rem;">
                            <label style="display:block; font-weight:700; color:#4a5568; margin-bottom:0.4rem; font-size:0.8rem; text-transform:uppercase;">Message</label>
                            <textarea id="lead-notes" class="input-sys" rows="4" placeholder="I'm looking for a lakefront property..." required></textarea>
                        </div>

                        <button type="submit" id="submit-lead-btn" class="btn btn-primary" style="width:100%; border-radius:8px; padding:1rem; font-size:1rem; font-weight:700;">Send Inquiry</button>
                        <div id="form-success-banner" style="display:none; margin-top:1.5rem; padding:1rem; background:#f0fff4; color:#2f855a; border-radius:8px; font-weight:600; text-align:center; border:1px solid #c6f6d5;">
                            ✓ Your inquiry was sent successfully.
                        </div>
                    </form>
                </div>
            `;

            // Lead form submit
            document.getElementById('agent-lead-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('submit-lead-btn');
                btn.textContent = 'Sending...';
                btn.style.opacity = '0.7';

                try {
                    const res = await fetch('/api/leads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: document.getElementById('lead-name').value,
                            email: document.getElementById('lead-email').value,
                            phone: document.getElementById('lead-phone').value,
                            notes: document.getElementById('lead-notes').value,
                            source: 'agent_inquiry',
                            agent_id: document.getElementById('form-agent-id').value
                        })
                    });

                    if (!res.ok) throw new Error('Failed');
                    btn.style.display = 'none';
                    document.getElementById('form-success-banner').style.display = 'block';
                } catch (err) {
                    btn.textContent = 'Send Inquiry';
                    btn.style.opacity = '1';
                    alert('Something went wrong. Please try again.');
                }
            });
        });

        function openModal() {
            document.getElementById('lead-modal').classList.add('active');
            nextModalStep(1);
        }
        function closeModal() {
            document.getElementById('lead-modal').classList.remove('active');
        }
        function nextModalStep(step) {
            document.querySelectorAll('.modal-step').forEach(el => el.classList.remove('active'));
            document.getElementById('modal-step-' + step).classList.add('active');
        }
    </script>
</body>
</html>
